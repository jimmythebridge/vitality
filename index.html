// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [view, setView]              = useState("home"); // "home" | "workout"
  const [workout,setWorkout]         = useState(defaultWorkout);
  const [history,setHistory]         = useState({});
  const [sessions,setSessions]       = useState({});
  const [templates,setTemplates]     = useState(DEFAULT_TEMPLATES);
  const [activeWorkoutName,setActiveWorkoutName] = useState("CUSTOM WORKOUT");
  const [activeTemplateId,setActiveTemplateId]   = useState(null);
  const [workoutTags,setWorkoutTags]   = useState([DEFAULT_TAGS[0]]);
  const [editingTitle,setEditingTitle] = useState(false);
  const [showTagPicker,setShowTagPicker] = useState(false);
  const [savedIds,setSavedIds]       = useState([]);
  const [showHistory,setShowHistory] = useState(false);
  const [showCalendar,setShowCalendar] = useState(false);
  const [activeTagFilter,setActiveTagFilter] = useState(null);
  const [activeDayDetail,setActiveDayDetail] = useState(null);
  const [schedulingTpl,setSchedulingTpl] = useState(null);
  const [schedule,setSchedule] = useState({});
  const [saved,setSaved]             = useState(false);
  const [activeTab,setActiveTab]     = useState("warmup");

  // Timer state
  const [timerActive,setTimerActive]         = useState(false);
  const [queue,setQueue]                     = useState([]);
  const [queueIdx,setQueueIdx]               = useState(0);
  const [secondsLeft,setSecondsLeft]         = useState(0);
  const [totalSeconds,setTotalSeconds]       = useState(0);
  const [running,setRunning]                 = useState(false);
  const intervalRef                          = useRef(null);
  const secondsRef                           = useRef(0);

  // Elapsed workout time (counts up, for the timeline display)
  const [elapsedSeconds,setElapsedSeconds]   = useState(0);
  const elapsedRef                           = useRef(0);

  // Resume prompt state
  const [resumePrompt,setResumePrompt]       = useState(null); // null or the saved progress object

  useEffect(()=>{
    setHistory(loadHistory());
    setSessions(loadSessions());
    setTemplates(loadTemplates());
    setSavedIds(loadSavedIds());
    setSchedule(loadSchedule());
    // Check for a paused workout from a previous session
    const saved = loadProgress();
    if (saved?.queue?.length) setResumePrompt(saved);
  },[]);

  function toggleSaved(id) {
    setSavedIds(prev => {
      const next = prev.includes(id) ? prev.filter(x=>x!==id) : [...prev, id];
      saveSavedIds(next);
      return next;
    });
  }

  function scheduleWorkoutForDate(dateKey, templateId) {
    const next = saveScheduleEntry(dateKey, templateId);
    setSchedule(next);
  }

  function launchTemplate(tpl) {
    // Warn if there's a paused session that would be overwritten
    if (loadProgress()?.queue?.length) {
      if (!window.confirm("You have a workout in progress. Starting a new one will discard your paused session. Continue?")) return;
      clearProgress();
    }
    setWorkout(JSON.parse(JSON.stringify(tpl.workout)));
    setActiveWorkoutName(tpl.name);
    setActiveTemplateId(tpl.id);
    setWorkoutTags(tpl.tags && tpl.tags.length ? tpl.tags : [DEFAULT_TAGS[0]]);
    setActiveTab("warmup");
    setView("workout");
  }

  function startBlankWorkout() {
    if (loadProgress()?.queue?.length) {
      if (!window.confirm("You have a workout in progress. Starting a new one will discard your paused session. Continue?")) return;
      clearProgress();
    }
    setWorkout(defaultWorkout());
    setActiveWorkoutName("CUSTOM WORKOUT");
    setActiveTemplateId(null);
    setWorkoutTags([DEFAULT_TAGS[0]]);
    setActiveTab("warmup");
    setView("workout");
  }

  // ── Timer tick ──
  useEffect(()=>{
    if(!timerActive) return;
    if(running){
      intervalRef.current = setInterval(()=>{
        secondsRef.current -= 1;
        elapsedRef.current += 1;
        setElapsedSeconds(elapsedRef.current);
        const currentStep = queue[queueIdx];
        if(secondsRef.current === 10 && currentStep?.type === "work") beepTenSecWarning();
        if(secondsRef.current <= 3 && secondsRef.current > 0) beepCountdown();
        if(secondsRef.current <= 0){
          clearInterval(intervalRef.current);
          advanceQueue(false);
        } else {
          setSecondsLeft(secondsRef.current);
        }
      },1000);
    } else {
      clearInterval(intervalRef.current);
    }
    return ()=>clearInterval(intervalRef.current);
  },[running,timerActive,queueIdx]);

  function startTimer(idx, q) {
    clearInterval(intervalRef.current);
    const step = q[idx];
    if(!step){ setTimerActive(false); return; }
    const dur = step.type==="rest" ? step.rest : step.work;
    secondsRef.current = dur;
    setSecondsLeft(dur);
    setTotalSeconds(dur);
    setQueueIdx(idx);
    setRunning(true);
  }

  function advanceQueue(manual=false) {
    clearInterval(intervalRef.current);
    const step = queue[queueIdx];

    if (step?.type === "work") beepWork();
    else if (step?.type === "prep") beepWork();
    else beepRest();

    const next = queueIdx + 1;
    if(next >= queue.length){
      setTimerActive(false);
      setRunning(false);
      clearProgress(); // workout finished naturally — no saved state needed
      return;
    }

    // Auto-save progress after every step so leaving mid-workout is recoverable.
    saveProgress({
      queue,
      queueIdx: next,
      secondsLeft: queue[next] ? (queue[next].type==="rest" ? queue[next].rest : queue[next].work) : 0,
      workout,
      activeWorkoutName,
      activeTemplateId,
      elapsedSeconds: elapsedRef.current,
    });

    startTimer(next, queue);
  }

  function launchTimer(workoutOverride) {
    // If there's a saved session, warn before overwriting it
    const existing = loadProgress();
    if (existing?.queue?.length) {
      // Discard the old session without prompt — caller is explicitly starting a new one.
      // (The "start new while one paused" warning path is handled separately in the UI.)
      clearProgress();
    }
    const q = buildQueue(workoutOverride || workout);
    setQueue(q);
    setTimerActive(true);
    setQueueIdx(0);
    elapsedRef.current = 0;
    setElapsedSeconds(0);
    const dur = q[0]?.work || 60;
    secondsRef.current = dur;
    setSecondsLeft(dur);
    setTotalSeconds(dur);
    setRunning(true);
  }

  function handleAddTime(secs) {
    secondsRef.current += secs;
    setSecondsLeft(s=>s+secs);
  }

  function handleSkipToNextExercise() {
    const currentLabel = queue[queueIdx]?.label;
    // Find the first step whose label differs from the current exercise name
    // and whose type is "prep" (the buffer before the next work step)
    let nextIdx = queueIdx + 1;
    while (nextIdx < queue.length) {
      const s = queue[nextIdx];
      if (s.label !== currentLabel && (s.type === "prep" || s.type === "work")) break;
      nextIdx++;
    }
    if (nextIdx < queue.length) {
      clearInterval(intervalRef.current);
      startTimer(nextIdx, queue);
    }
  }

  function resumeWorkout(saved) {
    setWorkout(saved.workout);
    setActiveWorkoutName(saved.activeWorkoutName || "CUSTOM WORKOUT");
    setActiveTemplateId(saved.activeTemplateId || null);
    setQueue(saved.queue);
    setQueueIdx(saved.queueIdx);
    elapsedRef.current = saved.elapsedSeconds || 0;
    setElapsedSeconds(saved.elapsedSeconds || 0);
    const dur = saved.secondsLeft || (saved.queue[saved.queueIdx]?.work || 60);
    secondsRef.current = dur;
    setSecondsLeft(dur);
    setTotalSeconds(saved.queue[saved.queueIdx]
      ? (saved.queue[saved.queueIdx].type==="rest" ? saved.queue[saved.queueIdx].rest : saved.queue[saved.queueIdx].work)
      : dur);
    setTimerActive(true);
    setRunning(false); // paused — user taps play when ready
    setView("workout");
    setResumePrompt(null);
  }

  function discardResume() {
    clearProgress();
    setResumePrompt(null);
  }

  function handlePlayPause() { setRunning(r=>!r); }

  function handleSkip() { advanceQueue(true); }

  function handleLogSet(ssIdx, exIdx, setIdx, { weight, reps }) {
    if(!weight && !reps) return;
    const w={...workout,supersets:workout.supersets.map((ss,si)=>
      si!==ssIdx?ss:{...ss,exercises:ss.exercises.map((ex,ei)=>
        ei!==exIdx?ex:{...ex,sets:ex.sets.map((s,i)=>
          i!==setIdx?s:{...s,loggedWeight:weight||s.loggedWeight,loggedReps:reps||s.loggedReps,done:true}
        )}
      )}
    )};
    setWorkout(w);
  }

  function handleLogCoreSet(coreIdx, setIdx, { weight, reps }) {
    if(!weight && !reps) return;
    const w={...workout,core:(workout.core||[]).map((ex,ci)=>
      ci!==coreIdx?ex:{...ex,sets:ex.sets.map((s,i)=>
        i!==setIdx?s:{...s,loggedWeight:weight||s.loggedWeight,loggedReps:reps||s.loggedReps,done:true}
      )}
    )};
    setWorkout(w);
  }

  // Warmup/cooldown items aren't full exercises with sets — they just get a
  // logged rep count and a done flag once you finish that step in the timer.
  function handleLogSimple(exerciseKey, reps) {
    const [section, idxStr] = exerciseKey.split("-");
    const idx = parseInt(idxStr, 10);
    if (section === "warmup") {
      setWorkout(w=>({...w, warmup: w.warmup.map((x,j)=>j===idx?{...x, loggedReps: reps, done:true}:x)}));
    } else if (section === "cd") {
      setWorkout(w=>({...w, cooldown: w.cooldown.map((x,j)=>j===idx?{...x, loggedReps: reps, done:true}:x)}));
    }
  }

  // ── Workout editing helpers ──
  const updateWarmup   = (i,item)=>setWorkout(w=>({...w,warmup:w.warmup.map((x,j)=>j===i?item:x)}));
  const updateCooldown = (i,item)=>setWorkout(w=>({...w,cooldown:w.cooldown.map((x,j)=>j===i?item:x)}));
  const updateSuperset = (i,ss)  =>setWorkout(w=>({...w,supersets:w.supersets.map((x,j)=>j===i?ss:x)}));
  const updateCoreEx   = (i,ex)  =>setWorkout(w=>({...w,core:(w.core||[]).map((x,j)=>j===i?ex:x)}));

  // Deletion is now always free — no minimums enforced. Blocks can shrink to
  // zero exercises if you want; they just won't contribute steps to the timer.
  const deleteWarmup     = (i) => setWorkout(w => ({ ...w, warmup: w.warmup.filter((_,j)=>j!==i) }));
  const deleteCooldown   = (i) => setWorkout(w => ({ ...w, cooldown: w.cooldown.filter((_,j)=>j!==i) }));
  const deleteCoreEx     = (i) => setWorkout(w => ({ ...w, core: (w.core||[]).filter((_,j)=>j!==i) }));
  const deleteSupersetEx = (si, ei) => setWorkout(w => ({
    ...w,
    supersets: w.supersets.map((ss,j)=> j!==si ? ss : { ...ss, exercises: ss.exercises.filter((_,k)=>k!==ei) }),
  }));

  // Add a fresh exercise to any block. New exercise starts unnamed so the
  // picker opens naturally when the person taps its title.
  const addWarmupEx   = () => setWorkout(w => ({ ...w, warmup: [...w.warmup, { name:"", done:false }] }));
  const addCooldownEx = () => setWorkout(w => ({ ...w, cooldown: [...w.cooldown, { name:"", done:false }] }));
  const addCoreEx     = () => setWorkout(w => ({ ...w, core: [...(w.core||[]), mkEx("",8,40,3)] }));
  const addSupersetEx = (si) => setWorkout(w => ({
    ...w,
    supersets: w.supersets.map((ss,j)=> j!==si ? ss : { ...ss, exercises: [...ss.exercises, mkEx("",8,45,3)] }),
  }));

  // Free-form custom blocks the person adds themselves — no role, user-typed title.
  const addCustomBlock = () => setWorkout(w => ({
    ...w,
    customBlocks: [...(w.customBlocks||[]), { id: `cb${Date.now()}`, title: "New Block", exercises: [mkEx("",8,45,3)] }],
  }));
  const updateCustomBlockTitle = (bi, title) => setWorkout(w => ({
    ...w, customBlocks: (w.customBlocks||[]).map((b,j)=> j!==bi ? b : { ...b, title }),
  }));
  const updateCustomBlockEx = (bi, ei, ex) => setWorkout(w => ({
    ...w, customBlocks: (w.customBlocks||[]).map((b,j)=> j!==bi ? b : { ...b, exercises: b.exercises.map((e,k)=>k!==ei?e:ex) }),
  }));
  const addCustomBlockEx = (bi) => setWorkout(w => ({
    ...w, customBlocks: (w.customBlocks||[]).map((b,j)=> j!==bi ? b : { ...b, exercises: [...b.exercises, mkEx("",8,45,3)] }),
  }));
  const deleteCustomBlockEx = (bi, ei) => setWorkout(w => ({
    ...w, customBlocks: (w.customBlocks||[]).map((b,j)=> j!==bi ? b : { ...b, exercises: b.exercises.filter((_,k)=>k!==ei) }),
  }));
  const deleteCustomBlock = (bi) => setWorkout(w => ({
    ...w, customBlocks: (w.customBlocks||[]).filter((_,j)=>j!==bi),
  }));

  // Block reordering (tap-hold-and-drag). The underlying data (warmup,
  // supersets, core, customBlocks, cooldown) is untouched — only the ORDER
  // they render in is reorderable, tracked as a separate list of block keys.
  // null means "use the default sequence" so existing workouts need no migration.
  const [blockOrder, setBlockOrder] = useState(null);

  function defaultBlockOrder(w) {
    const order = ["warmup"];
    w.supersets.forEach((_,i)=>order.push(`ss${i}`));
    order.push("core");
    (w.customBlocks||[]).forEach(b=>order.push(`cb-${b.id}`));
    order.push("cooldown");
    return order;
  }

  // Resolve the live order, reconciled against current blocks (handles a
  // block being added/deleted since the order was last set).
  function resolveBlockOrder() {
    const base = defaultBlockOrder(workout);
    if (!blockOrder) return base;
    const known = new Set(base);
    const kept = blockOrder.filter(k=>known.has(k));
    const missing = base.filter(k=>!kept.includes(k));
    return [...kept, ...missing];
  }

  function moveBlock(key, direction) {
    const order = resolveBlockOrder();
    const i = order.indexOf(key);
    const j = i + direction;
    if (i<0 || j<0 || j>=order.length) return;
    const next = [...order];
    [next[i], next[j]] = [next[j], next[i]];
    setBlockOrder(next);
  }

  function reorderBlocks(fromKey, toKey) {
    const order = resolveBlockOrder();
    const fromIdx = order.indexOf(fromKey);
    const toIdx = order.indexOf(toKey);
    if (fromIdx<0 || toIdx<0 || fromIdx===toIdx) return;
    const next = [...order];
    next.splice(fromIdx,1);
    next.splice(toIdx,0,fromKey);
    setBlockOrder(next);
  }

  const countSets=()=>{
    let total=0,done=0;
    workout.warmup.forEach(e=>{total++;if(e.done)done++;});
    workout.supersets.forEach(ss=>ss.exercises.forEach(ex=>ex.sets.forEach(s=>{total++;if(s.done)done++;})));
    (workout.core||[]).forEach(ex=>ex.sets.forEach(s=>{total++;if(s.done)done++;}));
    workout.cooldown.forEach(e=>{total++;if(e.done)done++;});
    return{total,done};
  };

  const handleSave=()=>{
    const nh={...history};
    workout.supersets.forEach(ss=>ss.exercises.forEach(ex=>{
      if(!ex.name)return;
      if(!nh[ex.name])nh[ex.name]=[];
      ex.sets.forEach(s=>{
        const reps = s.loggedReps || s.targetReps;
        if(s.loggedWeight && reps && s.done)
          nh[ex.name].push({weight:s.loggedWeight,reps,date:new Date().toISOString()});
      });
    }));
    (workout.core||[]).forEach(ex=>{
      if(!ex.name)return;
      if(!nh[ex.name])nh[ex.name]=[];
      ex.sets.forEach(s=>{
        const reps = s.loggedReps || s.targetReps;
        if(s.loggedWeight && reps && s.done)
          nh[ex.name].push({weight:s.loggedWeight,reps,date:new Date().toISOString()});
      });
    });
    saveHistory(nh);
    setHistory(nh);
    clearProgress(); // workout complete — no paused session to resume
    const updatedSessions = logSessionToday(activeWorkoutName);
    setSessions(updatedSessions);
    setSaved(true);
    setTimeout(()=>setSaved(false),2500);
  };

  const handleReset=()=>{
    if(window.confirm("Reset this workout? All current entries will be cleared.")){
      setWorkout(defaultWorkout());
      setActiveTab("warmup");
    }
  };

  const{total,done}=countSets();
  const tabs=[
    {id:"warmup", label:"Warm Up",   icon:"flame",    color:"#FF6B35"},
    {id:"supersets",label:"Work",    icon:"dumbbell", color:"#C8F03C"},
    {id:"cooldown",label:"Cool Down",icon:"refresh",  color:"#A78BFA"},
  ];

  // ── HOME SCREEN ──
  if (view === "home" && !timerActive) {
    return (
      <div style={S.root}>
        {resumePrompt && (
          <ResumePrompt
            saved={resumePrompt}
            onResume={()=>resumeWorkout(resumePrompt)}
            onDiscard={discardResume}
          />
        )}
        <div style={S.homeHeader}>
          <div style={S.homeLogoRow}>
            <Icon name="bolt" size={20} color="#C8F03C"/>
            <span className="block-display" style={{fontSize:22,color:"#E8E8EC"}}>VITALITY</span>
          </div>
          <button style={S.homeAvatar} onClick={()=>setShowHistory(true)}>
            <Icon name="history" size={17} color="#0D0D0F"/>
          </button>
        </div>

        <WeekStrip sessions={sessions} onDayTap={setActiveDayDetail}/>

        <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",paddingBottom:32}}>

          {/* Quick nav pills */}
          <div style={{display:"flex",gap:8,padding:"10px 18px 4px",overflowX:"auto"}}>
            <button style={{...S.homeNavTab,...S.homeNavTabActive}} onClick={()=>setShowCalendar(true)}>
              <Icon name="history" size={14} color="#0D0D0F"/> Calendar
            </button>
            <button style={S.homeNavTab} onClick={()=>setShowHistory(true)}>
              <Icon name="trophy" size={14} color="#999"/> History
            </button>
            <button style={S.homeNavTab} onClick={startBlankWorkout}>
              <Icon name="plus" size={14} color="#999"/> Blank workout
            </button>
          </div>

          {/* Workout carousel */}
          <div style={{...S.homeSection, paddingLeft:0, paddingRight:0, paddingTop:10}}>
            <div style={{...S.homeSectionTitle, padding:"0 18px"}}>
              <span>YOUR SAVED WORKOUTS</span>
              <span className="swipe-hint" style={{color:"#444",fontSize:11}}>swipe →</span>
            </div>
            <WorkoutCarousel templates={templates} onLaunch={launchTemplate}/>
          </div>

          {/* Calendar module */}
          <div style={S.homeSection}>
            <CalendarModule sessions={sessions} schedule={schedule} templates={templates} onDayTap={setActiveDayDetail}/>
          </div>

          {/* Stats strip */}
          <div style={{...S.homeSection}}>
            <div style={{display:"flex",gap:10}}>
              <div style={{flex:1,background:"#111115",border:"1px solid #1c1c22",borderRadius:14,padding:"14px"}}>
                <div style={{fontSize:22,fontWeight:900,color:"#C8F03C",fontFamily:"monospace"}}>
                  {Object.keys(sessions).length}
                </div>
                <div style={{fontSize:11,color:"#666",fontWeight:600,marginTop:2}}>Sessions logged</div>
              </div>
              <div style={{flex:1,background:"#111115",border:"1px solid #1c1c22",borderRadius:14,padding:"14px"}}>
                <div style={{fontSize:22,fontWeight:900,color:"#C8F03C",fontFamily:"monospace"}}>
                  {Object.keys(history).length}
                </div>
                <div style={{fontSize:11,color:"#666",fontWeight:600,marginTop:2}}>Exercises tracked</div>
              </div>
            </div>
          </div>

          {/* Browse by tag */}
          <div style={{...S.homeSection, paddingLeft:0, paddingRight:0}}>
            <div style={{...S.homeSectionTitle, padding:"0 18px"}}>
              <span>BROWSE BY TAG</span>
              <span className="swipe-hint" style={{color:"#444",fontSize:11}}>swipe →</span>
            </div>
            <TagBrowseRow onSelectTag={setActiveTagFilter}/>
          </div>

        </div>

        {showHistory&&<HistoryPanel history={history} onClose={()=>setShowHistory(false)}/>}
        {showCalendar&&(
          <div style={S.overlay} onClick={e=>e.target===e.currentTarget&&setShowCalendar(false)}>
            <div style={{...S.modalBox,maxHeight:"auto",padding:"4px 4px 24px"}}>
              <div style={S.modalHeader}>
                <span style={S.modalTitle}>Training Calendar</span>
                <button style={S.iconBtnSm} onClick={()=>setShowCalendar(false)}><Icon name="x" size={20} color="#888"/></button>
              </div>
              <div style={{padding:"8px 16px 0"}}>
                <CalendarModule sessions={sessions} schedule={schedule} templates={templates} onDayTap={setActiveDayDetail}/>
              </div>
            </div>
          </div>
        )}
        {activeTagFilter && (
          <WorkoutsByTagSheet
            tag={activeTagFilter}
            templates={templates}
            onClose={()=>setActiveTagFilter(null)}
            onOpenWorkout={tpl=>{setActiveTagFilter(null);launchTemplate(tpl);}}
            onSchedule={tpl=>{setSchedulingTpl(tpl);}}
            onStart={tpl=>{setActiveTagFilter(null);launchTemplate(tpl);launchTimer(tpl.workout);}}
          />
        )}
        {schedulingTpl && (
          <ScheduleDatePicker
            tpl={schedulingTpl}
            onClose={()=>setSchedulingTpl(null)}
            onConfirm={(dateKey)=>{
              scheduleWorkoutForDate(dateKey, schedulingTpl.id);
              setSchedulingTpl(null);
              setActiveTagFilter(null);
            }}
          />
        )}
        {activeDayDetail && (
          <DayDetailSheet
            dateKey={activeDayDetail}
            sessions={sessions}
            schedule={schedule}
            templates={templates}
            onClose={()=>setActiveDayDetail(null)}
            onOpenWorkout={tpl=>{setActiveDayDetail(null);setShowCalendar(false);launchTemplate(tpl);}}
            onClearSchedule={()=>{scheduleWorkoutForDate(activeDayDetail,null);setActiveDayDetail(null);}}
          />
        )}
      </div>
    );
  }

  // ── TIMER OVERLAY ──
  if(timerActive && queue.length){
    const step=queue[queueIdx]||queue[0];
    return (
      <div style={{...S.root,overflowY:"auto"}}>
        <TimerScreen
          step={step}
          secondsLeft={secondsLeft}
          totalSeconds={totalSeconds}
          running={running}
          onPlayPause={handlePlayPause}
          onSkip={handleSkip}
          onAddTime={handleAddTime}
          workout={workout}
          onLogSet={handleLogSet}
          onLogCoreSet={handleLogCoreSet}
          onLogSimple={handleLogSimple}
          queue={queue}
          queueIdx={queueIdx}
          elapsedSeconds={elapsedSeconds}
          onSkipToNextExercise={handleSkipToNextExercise}
          onExit={()=>{
            // Save progress when manually exiting mid-workout so it can be resumed later.
            if (queue.length && queueIdx < queue.length - 1) {
              saveProgress({
                queue, queueIdx, secondsLeft,
                workout, activeWorkoutName, activeTemplateId,
                elapsedSeconds: elapsedRef.current,
              });
            }
            clearInterval(intervalRef.current);
            setTimerActive(false);
            setRunning(false);
          }}
        />
      </div>
    );
  }

  // ── MAIN LAYOUT (single-scroll workout detail) ──
  const isSaved = activeTemplateId ? savedIds.includes(activeTemplateId) : false;
  const heroGrad = activeTemplateId
    ? (PHOTO_GRADIENTS[activeWorkoutName] || "linear-gradient(160deg, #1c1c22 0%, #0d0d0f 60%)")
    : "linear-gradient(160deg, #1c1c22 0%, #0d0d0f 60%)";
  const estDuration = Math.round(buildQueue(workout).reduce((sum,s)=>sum+(s.type==="rest"?s.rest:s.work),0)/60);

  return (
    <div style={S.root}>
      <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",paddingBottom:100}}>

        {/* HERO HEADER */}
        <div style={{...S.detailHero, background:heroGrad}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",position:"relative",zIndex:2,marginBottom:18}}>
            <button style={S.detailCloseBtn} onClick={()=>setView("home")}>
              <Icon name="x" size={18} color="#E8E8EC"/>
            </button>
            <button style={S.detailCloseBtn} onClick={()=>setShowHistory(true)}>
              <Icon name="history" size={17} color="#E8E8EC"/>
            </button>
          </div>

          <button style={S.detailTagRow} onClick={()=>setShowTagPicker(true)}>
            {workoutTags.map(tag=>{
              const color = tagColorFor(tag.label);
              return (
                <span key={tag.label} style={{...S.detailTagPill,background:color+"22",color}}>
                  <span style={{fontSize:13}}>{tag.emoji}</span> {tag.label}
                </span>
              );
            })}
            <span style={S.detailTagAddBtn}>
              <Icon name="plus" size={12} color="#999"/>
            </span>
          </button>

          <div style={S.detailDuration}>
            <Icon name="timer" size={16} color="#aaa"/> {estDuration || 30} min
          </div>

          {editingTitle ? (
            <input
              autoFocus
              className="block-display"
              style={S.detailTitleInput}
              value={activeWorkoutName}
              onChange={e=>setActiveWorkoutName(e.target.value.toUpperCase())}
              onBlur={()=>setEditingTitle(false)}
              onKeyDown={e=>{ if(e.key==="Enter") setEditingTitle(false); }}
            />
          ) : (
            <button
              className="block-display"
              style={S.detailTitleBtn}
              onClick={()=>setEditingTitle(true)}
            >
              {activeWorkoutName || "CUSTOM WORKOUT"} <span style={{fontSize:24}}>⚡</span>
              <Icon name="edit" size={14} color="rgba(255,255,255,0.4)"/>
            </button>
          )}

          <div style={{display:"flex",justifyContent:"center",marginTop:14,position:"relative",zIndex:2}}>
            <span style={S.detailEquipPill}>Dumbbells &amp; Barbell</span>
          </div>

          {/* ACTION ROW */}
          <div style={S.detailActionRow}>
            <button style={S.detailActionBtn} onClick={()=>activeTemplateId && toggleSaved(activeTemplateId)}>
              <Icon name="heart" size={22} color={isSaved ? "#C8F03C" : "#999"}/>
              <span style={{...S.detailActionLabel,color:isSaved?"#C8F03C":"#aaa"}}>{isSaved?"Saved":"Save"}</span>
            </button>
            <button style={S.detailActionBtn} onClick={()=>setShowCalendar(true)}>
              <Icon name="history" size={22} color="#999"/>
              <span style={S.detailActionLabel}>Schedule</span>
            </button>
            <button style={S.detailActionBtn} onClick={handleReset}>
              <Icon name="refresh" size={22} color="#999"/>
              <span style={S.detailActionLabel}>Reset</span>
            </button>
            <button style={S.detailActionBtn} onClick={()=>launchTimer()}>
              <Icon name="play" size={22} color="#C8F03C"/>
              <span style={{...S.detailActionLabel,color:"#C8F03C"}}>Start</span>
            </button>
          </div>
        </div>

        {/* ALL BLOCKS — order driven by resolveBlockOrder(), reorderable via tap-hold-drag */}
        <DraggableBlockList
          order={resolveBlockOrder()}
          onReorder={reorderBlocks}
          renderBlock={(key, dragProps) => {

            if (key === "warmup") return (
              <>
                <ListSectionHeader title="Warm Up" emoji="🔥"
                  subtitle={`${workout.warmup.length} exercise${workout.warmup.length!==1?"s":""} · Activate & prep`}
                  dragHandleProps={dragProps.dragHandleProps} isDragging={dragProps.isDragging}/>
                {workout.warmup.map((item,i)=>(
                  <SimpleListRow key={i} exercise={item.name}
                    onExerciseChange={name=>updateWarmup(i,{...item,name})}
                    onDelete={()=>deleteWarmup(i)}
                    history={history} phase="warmup" done={item.done}
                    onToggle={()=>updateWarmup(i,{...item,done:!item.done})}
                    duration={defaultTimings(item.name).work}/>
                ))}
                <AddExerciseRow onAdd={addWarmupEx}/>
              </>
            );

            if (key === "core") return (
              <>
                <ListSectionHeader title="Core Circuit" emoji="🔥"
                  subtitle={`${(workout.core||[]).length} exercise${(workout.core||[]).length!==1?"s":""} · Circuit format`}
                  dragHandleProps={dragProps.dragHandleProps} isDragging={dragProps.isDragging}/>
                {(workout.core||[]).map((ex,ci)=>(
                  <ExerciseListRow key={ci}
                    label={`${ci+1}`}
                    exercise={ex.name} sets={ex.sets} timings={ex.timings}
                    onExerciseChange={n=>updateCoreEx(ci,{...ex,name:n})}
                    onSetsChange={s=>updateCoreEx(ci,{...ex,sets:s})}
                    onTimingsChange={t=>updateCoreEx(ci,{...ex,timings:t})}
                    onDelete={()=>deleteCoreEx(ci)}
                    history={history} phase="core"/>
                ))}
                <AddExerciseRow onAdd={addCoreEx}/>
              </>
            );

            if (key === "cooldown") return (
              <>
                <ListSectionHeader title="Cool Down" emoji="🧘"
                  subtitle={`${workout.cooldown.length} stretch${workout.cooldown.length!==1?"es":""} · Release & recover`}
                  dragHandleProps={dragProps.dragHandleProps} isDragging={dragProps.isDragging}/>
                {workout.cooldown.map((item,i)=>(
                  <SimpleListRow key={i} exercise={item.name}
                    onExerciseChange={name=>updateCooldown(i,{...item,name})}
                    onDelete={()=>deleteCooldown(i)}
                    history={history} phase="cooldown" done={item.done}
                    onToggle={()=>updateCooldown(i,{...item,done:!item.done})}
                    duration={defaultTimings(item.name).work}/>
                ))}
                <AddExerciseRow onAdd={addCooldownEx}/>
              </>
            );

            if (key.startsWith("ss")) {
              const si = parseInt(key.slice(2), 10);
              const ss = workout.supersets[si];
              if (!ss) return null;
              const roleMeta = {
                major:      { title:"Major Lift",       emoji:"🏋️", sub:"Primary muscle group focus" },
                peripheral: { title:"Peripheral Work",   emoji:"💪", sub:"Secondary muscle group focus" },
                mobility:   { title:"Mobility",          emoji:"🤸", sub:"Dynamic movement focus" },
              }[ss.role] || { title:`Superset ${si+1}`, emoji:"⚡", sub:"" };
              return (
                <>
                  <ListSectionHeader title={roleMeta.title} emoji={roleMeta.emoji}
                    subtitle={`${ss.exercises.length} exercise${ss.exercises.length!==1?"s":""} · ${roleMeta.sub}`}
                    dragHandleProps={dragProps.dragHandleProps} isDragging={dragProps.isDragging}/>
                  {ss.exercises.map((ex,ei)=>(
                    <ExerciseListRow key={ei}
                      label={String.fromCharCode(65+ei)}
                      exercise={ex.name} sets={ex.sets} timings={ex.timings}
                      onExerciseChange={n=>{
                        const d={...ss,exercises:ss.exercises.map((e,i)=>i===ei?{...e,name:n}:e)};
                        updateSuperset(si,d);
                      }}
                      onSetsChange={s=>{
                        const d={...ss,exercises:ss.exercises.map((e,i)=>i===ei?{...e,sets:s}:e)};
                        updateSuperset(si,d);
                      }}
                      onTimingsChange={t=>{
                        const d={...ss,exercises:ss.exercises.map((e,i)=>i===ei?{...e,timings:t}:e)};
                        updateSuperset(si,d);
                      }}
                      onDelete={()=>deleteSupersetEx(si,ei)}
                      history={history} phase="strength"/>
                  ))}
                  <AddExerciseRow onAdd={()=>addSupersetEx(si)}/>
                </>
              );
            }

            if (key.startsWith("cb-")) {
              const blockId = key.slice(3);
              const bi = (workout.customBlocks||[]).findIndex(b=>b.id===blockId);
              const block = (workout.customBlocks||[])[bi];
              if (!block) return null;
              return (
                <>
                  <ListSectionHeader title={block.title} emoji="✨" editable
                    onTitleChange={t=>updateCustomBlockTitle(bi,t)}
                    onDeleteBlock={()=>deleteCustomBlock(bi)}
                    subtitle={`${block.exercises.length} exercise${block.exercises.length!==1?"s":""} · Custom block`}
                    dragHandleProps={dragProps.dragHandleProps} isDragging={dragProps.isDragging}/>
                  {block.exercises.map((ex,ei)=>(
                    <ExerciseListRow key={ei}
                      label={`${ei+1}`}
                      exercise={ex.name} sets={ex.sets} timings={ex.timings}
                      onExerciseChange={n=>updateCustomBlockEx(bi,ei,{...ex,name:n})}
                      onSetsChange={s=>updateCustomBlockEx(bi,ei,{...ex,sets:s})}
                      onTimingsChange={t=>updateCustomBlockEx(bi,ei,{...ex,timings:t})}
                      onDelete={()=>deleteCustomBlockEx(bi,ei)}
                      history={history} phase="strength"/>
                  ))}
                  <AddExerciseRow onAdd={()=>addCustomBlockEx(bi)}/>
                </>
              );
            }

            return null;
          }}
        />

        {/* ADD BLOCK */}
        <div style={{padding:"10px 18px 4px"}}>
          <button style={S.addBlockBtn} onClick={addCustomBlock}>
            <Icon name="plus" size={15} color="#C8F03C"/>
            <span>Add Block</span>
          </button>
        </div>

        {/* COMPLETION / SAVE CARD */}
        <div style={{padding:"24px 18px 0"}}>
          <div style={S.completionCard}>
            <div style={{fontSize:32,marginBottom:4}}>🏆</div>
            <div className="block-display" style={{fontSize:20,color:"#E8E8EC"}}>{done}/{total} logged</div>
            <div style={{fontSize:13,color:"#555",marginBottom:16}}>Save to record this session</div>
            <button style={{...S.saveBtn,...(saved?S.saveBtnDone:{}),width:"100%"}} onClick={handleSave}>
              {saved?<><Icon name="check" size={15} color="#0D0D0F"/> Saved to History!</>
                    :<><Icon name="bolt"  size={15} color="#0D0D0F"/> Save &amp; Log Session</>}
            </button>
          </div>
        </div>
      </div>

      {/* STICKY START BAR */}
      <div style={S.stickyStartBar}>
        <button style={S.stickyStartBtn} onClick={()=>launchTimer()}>
          <Icon name="play" size={16} color="#0D0D0F"/> START WORKOUT
        </button>
      </div>

      {showHistory&&<HistoryPanel history={history} onClose={()=>setShowHistory(false)}/>}
      {showTagPicker&&(
        <TagPicker
          selectedTags={workoutTags}
          onChange={setWorkoutTags}
          onClose={()=>setShowTagPicker(false)}
        />
      )}
      {showCalendar&&(
        <div style={S.overlay} onClick={e=>e.target===e.currentTarget&&setShowCalendar(false)}>
          <div style={{...S.modalBox,maxHeight:"auto",padding:"4px 4px 24px"}}>
            <div style={S.modalHeader}>
              <span style={S.modalTitle}>Training Calendar</span>
              <button style={S.iconBtnSm} onClick={()=>setShowCalendar(false)}><Icon name="x" size={20} color="#888"/></button>
            </div>
            <div style={{padding:"8px 16px 0"}}>
              <CalendarModule sessions={sessions} schedule={schedule} templates={templates} onDayTap={setActiveDayDetail}/>
            </div>
          </div>
        </div>
      )}
      {activeDayDetail && (
        <DayDetailSheet
          dateKey={activeDayDetail}
          sessions={sessions}
          schedule={schedule}
          templates={templates}
          onClose={()=>setActiveDayDetail(null)}
          onOpenWorkout={tpl=>{setActiveDayDetail(null);setShowCalendar(false);launchTemplate(tpl);}}
          onClearSchedule={()=>{scheduleWorkoutForDate(activeDayDetail,null);setActiveDayDetail(null);}}
        />
      )}
    </div>
  );
}

const S = {
  root:       { display:"flex",flexDirection:"column",height:"100vh",maxWidth:480,margin:"0 auto",background:"#0D0D0F",color:"#E8E8EC",overflow:"hidden",position:"relative" },

  exLabel:    { fontSize:9,fontWeight:900,letterSpacing:"0.18em",color:"#383840",flexShrink:0 },
  exSelector: { flex:1,display:"flex",alignItems:"center",justifyContent:"space-between",background:"#111115",border:"1px solid #1c1c22",borderRadius:8,padding:"8px 11px",cursor:"pointer" },
  statsBar:   { display:"flex",alignItems:"center",gap:7,flexWrap:"wrap",background:"#0a0a0d",border:"1px solid #141418",borderRadius:8,padding:"6px 10px",marginBottom:9 },
  statItem:   { display:"flex",alignItems:"center",gap:4,fontSize:11,fontWeight:600,color:"#777" },
  statsBarLarge: { display:"flex",flexDirection:"column",gap:3,marginBottom:10 },
  statsBarRow:   { display:"flex",alignItems:"baseline",gap:8 },
  statsBarLabel: { fontSize:13,color:"#999",fontWeight:500 },
  statsBarValue: { fontSize:15,color:"#C8F03C",fontWeight:800,fontFamily:"monospace" },
  timingChip: { display:"flex",alignItems:"center",gap:4,fontSize:10,fontWeight:800,padding:"4px 10px",borderRadius:14,background:"#C8F03C0e",border:"1px solid #C8F03C44" },
  timingEditBtn:{ background:"none",border:"none",cursor:"pointer",padding:"2px 6px",display:"flex",alignItems:"center" },

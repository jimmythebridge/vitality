<html lang="en">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>

<title>VITALITY · Workout Tracker</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-512.png"/>
<meta name="theme-color" content="#0D0D0F"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #0D0D0F; overscroll-behavior: none; }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; color: #E8E8EC; -webkit-font-smoothing: antialiased; }
  #root { height: 100%; }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
  input[type=number] { -moz-appearance: textfield; }
  /* iOS Safari auto-zooms on focus if an input's font-size is under 16px.
     This sets a 16px floor only on inputs that don't already specify a larger
     size inline (inline styles always win over this class, so it's a safe default). */
  input, textarea, select { font-size: 16px; }
  ::-webkit-scrollbar { width: 0; }
  button { font-family: inherit; }
  * { -webkit-tap-highlight-color: transparent; }

  @keyframes pulse-ring {
    0%   { transform: scale(1);    opacity: 0.6; }
    50%  { transform: scale(1.06); opacity: 0.2; }
    100% { transform: scale(1);    opacity: 0.6; }
  }
  @keyframes flash-in {
    0%   { opacity: 0; transform: scale(0.92); }
    100% { opacity: 1; transform: scale(1); }
  }
  .anim-flash { animation: flash-in 0.22s ease-out both; }

  .timer-ring-pulse { animation: pulse-ring 1.8s ease-in-out infinite; }

  @keyframes progress-sweep {
    from { stroke-dashoffset: var(--dash-start); }
    to   { stroke-dashoffset: var(--dash-end); }
  }

  /* ── Custom block display typeface ──
     Condensed, heavy, slightly squared-off — built from system font
     stack + aggressive letter-spacing/stretch to mimic a bespoke
     athletic display face without needing a font file. */
  .block-display {
    font-family: 'Arial Black', 'Helvetica Neue', Inter, sans-serif;
    font-weight: 900;
    letter-spacing: -0.02em;
    text-transform: uppercase;
    font-stretch: condensed;
    transform: scaleY(1.08);
    transform-origin: left center;
  }
  .block-display-tight {
    font-family: 'Arial Black', 'Helvetica Neue', Inter, sans-serif;
    font-weight: 900;
    letter-spacing: -0.03em;
    text-transform: uppercase;
    transform: scaleY(1.1) scaleX(0.96);
    transform-origin: left center;
  }

  @keyframes swipe-hint {
    0%, 100% { transform: translateX(0); }
    50% { transform: translateX(-6px); }
  }
  .swipe-hint { animation: swipe-hint 1.6s ease-in-out infinite; }

  .carousel-track {
    display: flex;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    gap: 14px;
    padding: 4px 14px 4px;
  }
  .carousel-track::-webkit-scrollbar { display: none; }
  .carousel-card {
    scroll-snap-align: start;
    flex-shrink: 0;
  }
</style>

<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// Mounts children directly onto document.body. Required for any fixed-position
// overlay (modals, pickers, sheets) that might be rendered inside a transformed
// ancestor (e.g. a swipe-to-delete row) — without this, `position:fixed`
// resolves relative to that ancestor instead of the viewport, trapping the
// overlay inside a tiny box instead of covering the screen.
function Portal({ children }) {
  return ReactDOM.createPortal(children, document.body);
}

// ─── EXERCISE LIBRARY ────────────────────────────────────────────────────────
const EXERCISE_LIBRARY = {
  warmup: [
    "World's Greatest Stretch","Hip 90/90","Thread the Needle","Cat-Cow","Thoracic Rotation",
    "Ankle Circles","Shoulder Circles","Leg Swings","Arm Circles","Inchworm",
    "Hip Flexor Stretch","Glute Bridge","Dead Bug","Band Pull-Apart","Jumping Jacks",
    "Bear Crawl","Cossack Squat","Wall Slides","Foam Roll Thoracic","Hip Circles",
  ],
  strength: [
    "Bench Press","Squat","Deadlift","Overhead Press","Barbell Row","Pull-Up","Dip",
    "Incline Bench Press","Romanian Deadlift","Front Squat","Bulgarian Split Squat",
    "Lat Pulldown","Cable Row","Chest Fly","Tricep Pushdown","Bicep Curl","Hammer Curl",
    "Lateral Raise","Face Pull","Leg Press","Leg Curl","Leg Extension","Calf Raise",
    "Hip Thrust","Farmers Walk","Turkish Get-Up","Kettlebell Swing","Box Jump",
    "Lunges","Step-Up","Goblet Squat","Sumo Deadlift","Hack Squat","Pendlay Row",
    "Seated Row","Arnold Press","Skull Crushers","Close-Grip Bench","Preacher Curl",
    "Cable Fly","Incline Dumbbell Curl","Overhead Tricep Extension","Reverse Fly",
    "Trap Bar Deadlift","Zercher Squat","Good Morning","Nordic Curl","GHD Raise",
  ],
  cooldown: [
    "Pigeon Pose","Hamstring Stretch","Quad Stretch","Hip Flexor Lunge","Child's Pose",
    "Seated Forward Fold","Lying Spinal Twist","Doorway Chest Stretch","Cross-Body Shoulder Stretch",
    "Calf Stretch","Butterfly Stretch","Neck Side Stretch","Foam Roll Quads","Foam Roll Thoracic",
    "Downward Dog","Supine Glute Stretch","Figure Four","Couch Stretch",
    "90/90 Hip Stretch","Shoulder Sleeper Stretch","Thoracic Extension on Foam Roller",
  ],
  core: [
    "Plank","Side Plank","Russian Twist","Bicycle Crunch","Hollow Hold","Bird Dog",
    "Dead Bug","Leg Raise","V-Up","Mountain Climber","Flutter Kick","Sit-Up",
    "Ab Wheel Rollout","Hanging Knee Raise","Pallof Press","Woodchopper","Plank Shoulder Tap",
  ],
};

// ─── SMART DEFAULTS ──────────────────────────────────────────────────────────
const COMPOUND = ["Bench Press","Squat","Deadlift","Overhead Press","Barbell Row","Pull-Up",
  "Incline Bench Press","Romanian Deadlift","Front Squat","Bulgarian Split Squat","Dip",
  "Hip Thrust","Farmers Walk","Turkish Get-Up","Box Jump","Sumo Deadlift","Hack Squat",
  "Pendlay Row","Trap Bar Deadlift","Zercher Squat","Good Morning","Nordic Curl","GHD Raise",
  "Leg Press","Goblet Squat","Lunges","Step-Up"];

function defaultTimings(exerciseName) {
  const isCompound = COMPOUND.includes(exerciseName);
  const isWarmup   = EXERCISE_LIBRARY.warmup.includes(exerciseName);
  const isCooldown = EXERCISE_LIBRARY.cooldown.includes(exerciseName);
  if (isWarmup || isCooldown) return { work: 40, rest: 10 };
  if (isCompound)              return { work: 60, rest: 45 };
  return                              { work: 45, rest: 30 };
}

// Fixed rest used specifically when moving from one exercise to the next
// within the same superset/circuit round — distinct from the rest taken
// between repeated rounds of the SAME exercise (which uses defaultTimings above).
const BETWEEN_EXERCISE_REST = 15;

// Fixed "get into position" buffer inserted before every single set, work
// or transition. Not user-editable — same for everyone, every exercise.
const PREP_TIME = 3;

// ─── STORAGE ─────────────────────────────────────────────────────────────────
const STORAGE_KEY   = "vitality_workout_history_v3";
const SESSIONS_KEY   = "vitality_session_log_v1";
const TEMPLATES_KEY  = "vitality_templates_v1";
const PROGRESS_KEY   = "vitality_session_progress_v1";

function saveHistory(h) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(h)); } catch {} }
function loadHistory()  { try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : {}; } catch { return {}; } }

// Mid-workout progress — saved every time a step completes, cleared on workout complete or discard.
function saveProgress(data) { try { localStorage.setItem(PROGRESS_KEY, JSON.stringify({ ...data, savedAt: Date.now() })); } catch {} }
function loadProgress()     { try { const r = localStorage.getItem(PROGRESS_KEY); return r ? JSON.parse(r) : null; } catch { return null; } }
function clearProgress()    { try { localStorage.removeItem(PROGRESS_KEY); } catch {} }

// Session log: { "2026-06-23": { count: 1, names: ["Push Day"] }, ... }
function saveSessions(s) { try { localStorage.setItem(SESSIONS_KEY, JSON.stringify(s)); } catch {} }
function loadSessions()  { try { const r = localStorage.getItem(SESSIONS_KEY); return r ? JSON.parse(r) : {}; } catch { return {}; } }
function logSessionToday(name) {
  const sessions = loadSessions();
  const key = new Date().toISOString().slice(0,10);
  const existing = sessions[key] || { count: 0, names: [] };
  existing.count += 1;
  if (name && !existing.names.includes(name)) existing.names.push(name);
  sessions[key] = existing;
  saveSessions(sessions);
  return sessions;
}

// Scheduled workouts: { "2026-06-25": templateId }, one workout per day
const SCHEDULE_KEY = "vitality_schedule_v1";
function loadSchedule() { try { const r = localStorage.getItem(SCHEDULE_KEY); return r ? JSON.parse(r) : {}; } catch { return {}; } }
function saveScheduleEntry(dateKey, templateId) {
  const all = loadSchedule();
  if (templateId === null) { delete all[dateKey]; }
  else { all[dateKey] = templateId; }
  try { localStorage.setItem(SCHEDULE_KEY, JSON.stringify(all)); } catch {}
  return all;
}

// Saved workout templates for the home carousel
function saveTemplates(t) { try { localStorage.setItem(TEMPLATES_KEY, JSON.stringify(t)); } catch {} }
function loadTemplates()  {
  try {
    const r = localStorage.getItem(TEMPLATES_KEY);
    if (r) return JSON.parse(r);
  } catch {}
  return DEFAULT_TEMPLATES;
}

// Saved/favourited workout ids (heart toggle)
const SAVED_IDS_KEY = "vitality_saved_ids_v1";
function saveSavedIds(ids) { try { localStorage.setItem(SAVED_IDS_KEY, JSON.stringify(ids)); } catch {} }
function loadSavedIds()    { try { const r = localStorage.getItem(SAVED_IDS_KEY); return r ? JSON.parse(r) : []; } catch { return []; } }

// Custom user-added exercises, keyed by library type (warmup/strength/core/cooldown)
const CUSTOM_EX_KEY = "vitality_custom_exercises_v1";
function loadCustomExercises() {
  try { const r = localStorage.getItem(CUSTOM_EX_KEY); return r ? JSON.parse(r) : {warmup:[],strength:[],core:[],cooldown:[]}; }
  catch { return {warmup:[],strength:[],core:[],cooldown:[]}; }
}
function addCustomExercise(type, name) {
  const all = loadCustomExercises();
  if (!all[type]) all[type] = [];
  if (!all[type].some(e=>e.toLowerCase()===name.toLowerCase())) {
    all[type] = [...all[type], name];
    try { localStorage.setItem(CUSTOM_EX_KEY, JSON.stringify(all)); } catch {}
  }
  return all;
}

// ─── WORKOUT TAGS ─────────────────────────────────────────────────────────────
const DEFAULT_TAGS = [
  { emoji:"⭐️", label:"Priority" },
  { emoji:"😮‍💨", label:"Recovery" },
  { emoji:"💪", label:"Upper Body" },
  { emoji:"🦿", label:"Lower Body" },
  { emoji:"🏋️‍♀️", label:"Full Body" },
  { emoji:"🤸", label:"Stretchy" },
  { emoji:"⚡️", label:"Agile" },
];
const TAG_COLORS = ["#C8F03C","#A78BFA","#FFB800","#FF6B35","#5EEAD4","#F472B6","#60A5FA"];
function tagColorFor(label) {
  let hash = 0;
  for (let i=0;i<label.length;i++) hash = (hash*31 + label.charCodeAt(i)) % TAG_COLORS.length;
  return TAG_COLORS[Math.abs(hash)];
}

const CUSTOM_TAGS_KEY = "vitality_custom_tags_v1";
function loadCustomTags() {
  try { const r = localStorage.getItem(CUSTOM_TAGS_KEY); return r ? JSON.parse(r) : []; }
  catch { return []; }
}
function addCustomTag(emoji, label) {
  const all = loadCustomTags();
  if (!all.some(t=>t.label.toLowerCase()===label.toLowerCase())) {
    const next = [...all, { emoji, label }];
    try { localStorage.setItem(CUSTOM_TAGS_KEY, JSON.stringify(next)); } catch {}
    return next;
  }
  return all;
}

function calcStats(logs) {
  if (!logs?.length) return null;
  const weights = logs.map(l => parseFloat(l.weight)).filter(w => !isNaN(w) && w > 0);
  if (!weights.length) return null;
  // Find the log entry with the max weight to estimate 1RM from its rep count (Epley formula)
  let bestLog = logs[0], bestW = 0;
  logs.forEach(l => { const w = parseFloat(l.weight); if (!isNaN(w) && w > bestW) { bestW = w; bestLog = l; } });
  const bestReps = parseFloat(bestLog.reps) || 1;
  const estOneRM = bestReps > 1 ? Math.round(bestW * (1 + bestReps/30)) : bestW;
  return {
    pb:         Math.max(...weights),
    avg:        Math.round((weights.reduce((a,b)=>a+b,0)/weights.length)*10)/10,
    lastWeight: weights[weights.length-1],
    logCount:   logs.length,
    estOneRM,
  };
}

// ─── AUDIO ───────────────────────────────────────────────────────────────────
function beep(freq=880, dur=0.12, type="sine", vol=0.4) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type; osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start(); osc.stop(ctx.currentTime + dur);
  } catch {}
}
function beepWork() { beep(660, 0.10, "sine", 0.3); setTimeout(()=>beep(880,0.15,"sine",0.4),120); }
function beepRest() { beep(440, 0.15, "sine", 0.35); setTimeout(()=>beep(330,0.20,"sine",0.3),150); }
function beepCountdown() { beep(1047, 0.08, "sine", 0.2); }
// Distinct "10 seconds remaining" bell — a single warmer, longer tone so it's
// clearly different from the sharp 3-2-1 countdown beeps that follow it.
function beepTenSecWarning() { beep(784, 0.22, "triangle", 0.32); }

// ─── FLAT WORKOUT QUEUE ──────────────────────────────────────────────────────
// Builds a flat ordered list of "steps" from the workout structure.
// Each step: { id, phase, label, subLabel, exerciseKey, setIndex, type:"work"|"rest"|"hold" }
function buildQueue(workout) {
  const steps = [];
  let id = 0;

  // Warmup
  workout.warmup.forEach((item, i) => {
    const t = defaultTimings(item.name);
    const nextLabel = workout.warmup[i+1]?.name || (workout.supersets[0] ? "Major lift" : "Strength work");
    steps.push({ id: id++, phase:"warmup", type:"work", label: item.name, subLabel:"Warm-up", exerciseKey:`warmup-${i}`, setIndex:0, targetReps:1, work:t.work, rest:t.rest });
    steps.push({ id: id++, phase:"warmup", type:"rest", label:"Rest",      subLabel:`Next: ${nextLabel}`, exerciseKey:`warmup-${i}`, setIndex:0, work:t.work, rest:t.rest });
  });

  // Supersets
  const roleLabel = { major:"Major", peripheral:"Peripheral", mobility:"Mobility" };
  workout.supersets.forEach((ss, si) => {
    const namedSSEx = ss.exercises
      .map((ex, originalIdx) => ({ ex, originalIdx }))
      .filter(({ex}) => ex.name);
    if (!namedSSEx.length) return;
    const totalSets = namedSSEx[0]?.ex?.sets?.length || 3;
    const rLabel = roleLabel[ss.role] || `Superset ${si+1}`;
    for (let setIdx = 0; setIdx < totalSets; setIdx++) {
      namedSSEx.forEach(({ex, originalIdx: ei}, listIdx) => {
        const setData = ex.sets[setIdx] || {};
        const t = ex.timings || defaultTimings(ex.name);
        const workTime = setData.targetTime || t.work;
        const isLastExInSet   = listIdx === namedSSEx.length - 1;
        const isLastSetOfSS   = setIdx === totalSets - 1;
        const nextLabel = !isLastExInSet
          ? namedSSEx[listIdx+1].ex.name
          : isLastSetOfSS
            ? (workout.supersets[si+1] ? roleLabel[workout.supersets[si+1].role] : "Core circuit")
            : `Set ${setIdx+2} · ${namedSSEx[0].ex.name}`;

        steps.push({
          id: id++, phase:"strength", type:"work",
          label: ex.name,
          subLabel: `${rLabel} · Set ${setIdx+1}/${totalSets}`,
          exerciseKey: `ss${si}-ex${ei}`,
          setIndex: setIdx,
          ssIndex: si, exIndex: ei,
          targetReps: setData.targetReps,
          work: workTime, rest: t.rest,
        });
        steps.push({
          id: id++, phase:"strength", type:"rest",
          label: "Rest",
          subLabel: `Next: ${nextLabel}`,
          exerciseKey: `ss${si}-ex${ei}`,
          setIndex: setIdx,
          ssIndex: si, exIndex: ei,
          work: workTime,
          // Moving to the OTHER exercise in this round → short 15s transition rest.
          // Looping back to the same exercise for its next round → its own rest value.
          rest: isLastExInSet ? t.rest : BETWEEN_EXERCISE_REST,
          isLastExInSet, isLastSetOfSS,
        });
      });
    }
  });

  // Core circuit (always 3 exercises)
  const coreList = workout.core || [];
  coreList.forEach((ex, ci) => {
    if (!ex.name) return;
    const t = ex.timings || defaultTimings(ex.name);
    const totalSets = ex.sets?.length || 3;
    for (let setIdx = 0; setIdx < totalSets; setIdx++) {
      const setData = ex.sets[setIdx] || {};
      const workTime = setData.targetTime || t.work;
      const isLast = ci === (coreList.length - 1) && setIdx === totalSets - 1;
      steps.push({
        id: id++, phase:"core", type:"work",
        label: ex.name,
        subLabel: `Core circuit · Round ${setIdx+1}/${totalSets}`,
        exerciseKey: `core${ci}`,
        setIndex: setIdx, coreIndex: ci,
        targetReps: setData.targetReps,
        work: workTime, rest: t.rest,
      });
      const isLastSetOfThisEx = setIdx === totalSets - 1;
      steps.push({
        id: id++, phase:"core", type:"rest",
        label: "Rest",
        subLabel: isLast ? "Next: Cool down" : `Next: ${coreList[(ci+1)%coreList.length]?.name || "Cool down"}`,
        exerciseKey: `core${ci}`,
        setIndex: setIdx, coreIndex: ci,
        work: workTime,
        // Last set of this exercise → moving to a DIFFERENT exercise → short 15s rest.
        // Otherwise → next round of the SAME exercise → its own rest value.
        rest: isLastSetOfThisEx ? BETWEEN_EXERCISE_REST : t.rest,
      });
    }
  });

  // Custom blocks (free-form, user-added)
  const customList = workout.customBlocks || [];
  customList.forEach((block, bi) => {
    const namedExercises = block.exercises
      .map((ex, originalIdx) => ({ ex, originalIdx }))
      .filter(({ex}) => ex.name);
    namedExercises.forEach(({ex, originalIdx: ei}, listIdx) => {
      const t = ex.timings || defaultTimings(ex.name);
      const totalSets = ex.sets?.length || 3;
      for (let setIdx = 0; setIdx < totalSets; setIdx++) {
        const setData = ex.sets[setIdx] || {};
        const workTime = setData.targetTime || t.work;
        const isLastEx = listIdx === namedExercises.length - 1;
        const isLastSet = setIdx === totalSets - 1;
        const nextLabel = !isLastEx
          ? namedExercises[listIdx+1].ex.name
          : isLastSet
            ? (customList[bi+1] ? customList[bi+1].title : "Cool down")
            : `Set ${setIdx+2} · ${namedExercises[0].ex.name}`;
        steps.push({
          id: id++, phase:"custom", type:"work",
          label: ex.name,
          subLabel: `${block.title} · Set ${setIdx+1}/${totalSets}`,
          exerciseKey: `cb${bi}-ex${ei}`,
          setIndex: setIdx, blockIndex: bi, exIndex: ei,
          targetReps: setData.targetReps,
          work: workTime, rest: t.rest,
        });
        steps.push({
          id: id++, phase:"custom", type:"rest",
          label: "Rest",
          subLabel: `Next: ${nextLabel}`,
          exerciseKey: `cb${bi}-ex${ei}`,
          setIndex: setIdx, blockIndex: bi, exIndex: ei,
          work: workTime,
          // Last set of THIS exercise → next is a different exercise → 15s.
          // Otherwise → next round of the same exercise → its own rest value.
          rest: isLastSet ? BETWEEN_EXERCISE_REST : t.rest,
        });
      }
    });
  });

  // Cooldown
  workout.cooldown.forEach((item, i) => {
    const t = defaultTimings(item.name);
    steps.push({ id: id++, phase:"cooldown", type:"work", label: item.name, subLabel:"Cool-down stretch", exerciseKey:`cd-${i}`, setIndex:0, targetReps:1, work:t.work, rest:t.rest });
    if (i < workout.cooldown.length - 1) {
      steps.push({ id: id++, phase:"cooldown", type:"rest", label:"Rest", subLabel:`Next: ${workout.cooldown[i+1]?.name}`, exerciseKey:`cd-${i}`, setIndex:0, work:t.work, rest:t.rest });
    }
  });

  // Insert a fixed 3-second "get into position" prep step before every work
  // step — gives a buffer to get set up before the countdown actually starts.
  const withPrep = [];
  steps.forEach(step => {
    if (step.type === "work") {
      withPrep.push({
        ...step,
        id: id++,
        type: "prep",
        subLabel: `Get ready: ${step.label}`,
        work: PREP_TIME,
      });
    }
    withPrep.push(step);
  });

  return withPrep;
}

// ─── ICONS ───────────────────────────────────────────────────────────────────
function Icon({ name, size=18, color="currentColor" }) {
  const p = { width:size, height:size, fill:"none", stroke:color, strokeWidth:"2", strokeLinecap:"round", strokeLinejoin:"round", viewBox:"0 0 24 24" };
  const d = {
    plus:      <svg {...p} strokeWidth="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
    minus:     <svg {...p} strokeWidth="2.5"><line x1="5" y1="12" x2="19" y2="12"/></svg>,
    check:     <svg {...p} strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg>,
    x:         <svg {...p} strokeWidth="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
    chevDown:  <svg {...p} strokeWidth="2.5"><polyline points="6 9 12 15 18 9"/></svg>,
    play:      <svg {...p} strokeWidth="2"><polygon points="5 3 19 12 5 21 5 3" fill={color} stroke="none"/></svg>,
    pause:     <svg {...p} strokeWidth="2.5"><rect x="6" y="4" width="4" height="16" fill={color} stroke="none"/><rect x="14" y="4" width="4" height="16" fill={color} stroke="none"/></svg>,
    skip:      <svg {...p} strokeWidth="2"><polygon points="5 4 15 12 5 20 5 4" fill={color} stroke="none"/><line x1="19" y1="5" x2="19" y2="19" stroke={color} strokeWidth="2.5"/></svg>,
    history:   <svg {...p}><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>,
    refresh:   <svg {...p}><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>,

    bolt:      <svg width={size} height={size} viewBox="0 0 24 24" fill={color} stroke="none"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
    timer:     <svg {...p}><circle cx="12" cy="13" r="8"/><polyline points="12 9 12 13 14.5 15.5"/><path d="M10 2h4"/><path d="M21 5l-1.5 1.5"/></svg>,
    addTime:   <svg {...p} strokeWidth="2"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>,
    settings:  <svg {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>,
    back:      <svg {...p} strokeWidth="2.5"><polyline points="15 18 9 12 15 6"/></svg>,
    heart:     <svg {...p} strokeWidth="2" fill={color==="#C8F03C"?color:"none"}><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>,
    edit:      <svg {...p}><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
    dragHandle: <svg width={size} height={size} viewBox="0 0 24 24" fill={color} stroke="none">
      <circle cx="9" cy="6" r="1.6"/><circle cx="15" cy="6" r="1.6"/>
      <circle cx="9" cy="12" r="1.6"/><circle cx="15" cy="12" r="1.6"/>
      <circle cx="9" cy="18" r="1.6"/><circle cx="15" cy="18" r="1.6"/>
    </svg>,
  };
  return d[name] || null;
}

// ─── CIRCULAR TIMER RING ─────────────────────────────────────────────────────
function TimerRing({ seconds, total, phase }) {
  const R = 108;
  const CIRC = 2 * Math.PI * R;
  const pct = total > 0 ? seconds / total : 1;
  const offset = CIRC * (1 - pct);
  const isRest = phase === "rest";
  const isPrep = phase === "prep";
  const color = isPrep ? "#5EEAD4" : isRest ? "#A78BFA" : "#C8F03C";
  const mins = Math.floor(seconds / 60);
  const secs = seconds % 60;
  const timeStr = mins > 0 ? `${mins}:${String(secs).padStart(2,"0")}` : String(seconds);
  const warn = seconds <= 3 && seconds > 0;

  return (
    <div style={{ position:"relative", width:260, height:260, flexShrink:0 }}>
      {/* Pulse rings when warning */}
      {warn && (
        <div className="timer-ring-pulse" style={{
          position:"absolute", inset:0, borderRadius:"50%",
          border:`3px solid ${color}`, opacity:0.4,
        }}/>
      )}
      <svg width={260} height={260} style={{ position:"absolute", inset:0 }}>
        {/* Track */}
        <circle cx={130} cy={130} r={R} fill="none" stroke="#1a1a20" strokeWidth={10}/>
        {/* Progress */}
        <circle
          cx={130} cy={130} r={R}
          fill="none"
          stroke={color}
          strokeWidth={10}
          strokeLinecap="round"
          strokeDasharray={CIRC}
          strokeDashoffset={offset}
          transform="rotate(-90 130 130)"
          style={{ transition: "stroke-dashoffset 1s linear, stroke 0.3s" }}
        />
      </svg>
      {/* Centre content */}
      <div style={{
        position:"absolute", inset:0,
        display:"flex", flexDirection:"column",
        alignItems:"center", justifyContent:"center", gap:2,
      }}>
        <div style={{
          fontSize: warn ? 52 : 58,
          fontWeight: 900, fontFamily:"monospace",
          color: warn ? "#FF4444" : color,
          letterSpacing:"-2px",
          transition:"color 0.2s",
          lineHeight:1,
        }}>{timeStr}</div>
        <div style={{
          fontSize:11, fontWeight:800, letterSpacing:"0.18em",
          color: isPrep ? "#3da89a" : isRest ? "#7c6bd4" : "#7a9926",
          marginTop:4,
        }}>{isPrep ? "GET READY" : isRest ? "REST" : "WORK"}</div>
      </div>
    </div>
  );
}

// ─── RESUME PROMPT ────────────────────────────────────────────────────────────
function ResumePrompt({ saved, onResume, onDiscard }) {
  const savedAgo = saved.savedAt
    ? Math.round((Date.now() - saved.savedAt) / 60000)
    : null;
  const stepsDone = saved.queueIdx || 0;
  const stepsTotal = saved.queue?.length || 1;
  const pct = Math.round((stepsDone / stepsTotal) * 100);

  return (
    <Portal>
      <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.92)", zIndex:300,
        display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"flex-end",
        padding:"0 0 40px" }}>
        <div style={{ width:"100%", maxWidth:480, background:"#111115",
          borderRadius:"24px 24px 0 0", border:"1px solid #1e1e26", borderBottom:"none",
          padding:"28px 24px 32px", display:"flex", flexDirection:"column", gap:20 }}>

          <div style={{ display:"flex", alignItems:"center", gap:12 }}>
            <div style={{ width:48, height:48, borderRadius:14, background:"#C8F03C1a",
              border:"1px solid #C8F03C44", display:"flex", alignItems:"center", justifyContent:"center" }}>
              <Icon name="play" size={20} color="#C8F03C"/>
            </div>
            <div>
              <div className="block-display" style={{ fontSize:18, color:"#E8E8EC" }}>
                {saved.activeWorkoutName || "Workout"}
              </div>
              <div style={{ fontSize:12, color:"#666", marginTop:2 }}>
                {pct}% complete{savedAgo !== null ? ` · paused ${savedAgo < 1 ? "just now" : `${savedAgo}m ago`}` : ""}
              </div>
            </div>
          </div>

          {/* Mini progress bar */}
          <div style={{ height:4, background:"#1a1a1f", borderRadius:2, overflow:"hidden" }}>
            <div style={{ width:`${pct}%`, height:"100%", background:"#C8F03C", borderRadius:2,
              transition:"width 0.4s ease" }}/>
          </div>

          <button style={{ width:"100%", padding:"15px", borderRadius:14, background:"#C8F03C",
            border:"none", color:"#0D0D0F", fontSize:15, fontWeight:900, cursor:"pointer",
            display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}
            onClick={onResume}>
            <Icon name="play" size={16} color="#0D0D0F"/> Resume Workout
          </button>

          <button style={{ width:"100%", padding:"13px", borderRadius:14, background:"#111115",
            border:"1px solid #252530", color:"#999", fontSize:14, fontWeight:700, cursor:"pointer" }}
            onClick={onDiscard}>
            Discard &amp; start fresh
          </button>
        </div>
      </div>
    </Portal>
  );
}

// ─── WORKOUT TIMELINE BAR ─────────────────────────────────────────────────────
// A segmented horizontal bar showing the full workout queue. Each segment is
// one step. Completed steps are filled white, the current step is highlighted
// with a lime dot, future steps are faint dashes. Groups by phase colour.
function WorkoutTimeline({ queue, queueIdx, elapsedSeconds }) {
  const mins = Math.floor(elapsedSeconds / 60);
  const secs = elapsedSeconds % 60;
  const elapsed = `${mins}:${String(secs).padStart(2,"0")}`;
  const pct = queue.length > 0 ? Math.round((queueIdx / queue.length) * 100) : 0;

  const phaseColor = (step) => {
    if (!step) return "#333";
    if (step.type === "prep")  return "#5EEAD4";
    if (step.type === "rest")  return "#A78BFA";
    if (step.phase === "warmup")   return "#FF6B35";
    if (step.phase === "core")     return "#FFB800";
    if (step.phase === "cooldown") return "#A78BFA";
    return "#C8F03C";
  };

  return (
    <div style={{ width:"100%", paddingBottom:12 }}>
      <div style={{ display:"flex", alignItems:"baseline", gap:8, marginBottom:8, paddingHorizontal:0 }}>
        <span style={{ fontSize:16, fontWeight:900, color:"#E8E8EC", fontFamily:"monospace" }}>{elapsed}</span>
        <span style={{ fontSize:13, color:"#666", fontWeight:600 }}>· {pct}%</span>
      </div>
      <div style={{ display:"flex", alignItems:"center", gap:2, height:4 }}>
        {queue.map((step, i) => {
          const isDone    = i < queueIdx;
          const isCurrent = i === queueIdx;
          const color     = phaseColor(step);
          return (
            <div key={i} style={{ flex:1, height: isCurrent ? 6 : 4, borderRadius:3,
              background: isDone ? "#E8E8EC" : isCurrent ? color : color + "30",
              transition:"all 0.3s ease",
              marginTop: isCurrent ? -1 : 0,
            }}/>
          );
        })}
      </div>
      {/* Current step dot indicator — shows which segment we're on */}
      {queue.length > 0 && (
        <div style={{ position:"relative", height:10, marginTop:2 }}>
          <div style={{
            position:"absolute",
            left:`calc(${(queueIdx / queue.length) * 100}% - 5px)`,
            top:0, width:10, height:10, borderRadius:"50%",
            background: phaseColor(queue[queueIdx]),
            transition:"left 0.4s ease",
          }}/>
        </div>
      )}
    </div>
  );
}

// ─── TIMER SCREEN ─────────────────────────────────────────────────────────────
function TimerScreen({ step, secondsLeft, totalSeconds, running, onPlayPause, onSkip, onAddTime, workout, onLogSet, onLogCoreSet, onLogSimple, onExit, queue, queueIdx, elapsedSeconds, onSkipToNextExercise }) {
  const isWork = step.type === "work";
  const isRest = step.type === "rest";
  const isPrep = step.type === "prep";
  const isStrength = step.phase === "strength";
  const isCore = step.phase === "core";
  const isSimple = step.phase === "warmup" || step.phase === "cooldown";

  // Swipe-left gesture to jump to next exercise
  const swipeStartX = useRef(null);
  const swipeStartY = useRef(null);
  const [swipeHint, setSwipeHint] = useState(false);

  function handleTouchStart(e) {
    swipeStartX.current = e.touches[0].clientX;
    swipeStartY.current = e.touches[0].clientY;
  }
  function handleTouchEnd(e) {
    if (swipeStartX.current === null) return;
    const dx = e.changedTouches[0].clientX - swipeStartX.current;
    const dy = Math.abs(e.changedTouches[0].clientY - swipeStartY.current);
    swipeStartX.current = null;
    // Left swipe: at least 60px horizontal, under 40px vertical drift
    if (dx < -60 && dy < 40 && onSkipToNextExercise) {
      setSwipeHint(true);
      setTimeout(()=>setSwipeHint(false), 600);
      onSkipToNextExercise();
    }
  }

  // Reps default to the suggested target (shown grey) until the user overrides it.
  const [reps, setReps]     = useState("");
  const [weight, setWeight] = useState("");
  const repsHasValue = reps !== "";

  // Reset local inputs whenever we land on a new work step
  useEffect(() => { setReps(""); setWeight(""); }, [step.id]);

  const phaseColor = isPrep ? "#5EEAD4" : ({
    warmup:   "#FF6B35",
    strength: isRest ? "#A78BFA" : "#C8F03C",
    core:     isRest ? "#A78BFA" : "#FFB800",
    cooldown: "#A78BFA",
  }[step.phase] || "#C8F03C");

  const handleDone = () => {
    const repsToLog = repsHasValue ? reps : (step.targetReps ?? "");
    if (isStrength && isWork && step.ssIndex !== undefined) {
      onLogSet(step.ssIndex, step.exIndex, step.setIndex, { weight, reps: repsToLog });
    }
    if (isCore && isWork && step.coreIndex !== undefined) {
      onLogCoreSet(step.coreIndex, step.setIndex, { weight, reps: repsToLog });
    }
    if (isSimple && isWork && onLogSimple) {
      onLogSimple(step.exerciseKey, repsToLog);
    }
    onSkip();
  };

  // Explicit skip — advances to the next step WITHOUT logging anything for
  // this set. Distinct from "Set Complete", which always logs first.
  const handleSkipOnly = () => { onSkip(); };

  return (
    <div className="anim-flash" style={{
      display:"flex", flexDirection:"column", alignItems:"center",
      padding:"0 24px 32px",
      minHeight:"100%",
      background:"#0D0D0F",
    }}
      onTouchStart={handleTouchStart}
      onTouchEnd={handleTouchEnd}
    >

      {/* Progress timeline — elapsed time + segmented position bar */}
      {queue?.length > 0 && (
        <div style={{ width:"100%", padding:"12px 0 0" }}>
          <WorkoutTimeline queue={queue} queueIdx={queueIdx} elapsedSeconds={elapsedSeconds}/>
        </div>
      )}

      {/* Top bar */}
      <div style={{
        display:"flex", alignItems:"center", justifyContent:"space-between",
        width:"100%", padding:"8px 0 8px",
      }}>
        <button style={S.iconBtnSm} onClick={onExit}>
          <Icon name="back" size={20} color="#666"/>
        </button>
        <div style={{ fontSize:11, fontWeight:800, letterSpacing:"0.15em", color:"#383840" }}>
          {step.subLabel?.toUpperCase()}
        </div>
        <div style={{ width:36 }}/>
      </div>

      {/* Exercise name */}
      <div className="block-display" style={{
        fontSize: step.label.length > 18 ? 24 : 28,
        textAlign:"center",
        color:"#E8E8EC", marginBottom:4, marginTop:8,
        lineHeight:1.15,
      }}>{step.label}</div>

      {/* Phase pill */}
      <div style={{
        background: phaseColor + "1a",
        border:`1px solid ${phaseColor}44`,
        borderRadius:20, padding:"3px 12px", marginBottom:28,
        fontSize:11, fontWeight:800, color:phaseColor, letterSpacing:"0.1em",
      }}>
        {isPrep ? "GET READY" : isRest ? "REST" : step.phase === "warmup" ? "WARM UP" : step.phase === "cooldown" ? "COOL DOWN" : step.phase === "core" ? "CORE CIRCUIT" : "WORK SET"}
      </div>

      {/* Ring */}
      <TimerRing seconds={secondsLeft} total={totalSeconds} phase={step.type}/>

      {/* Log inputs — every work step gets a rep field; strength/core also get weight */}
      {isWork && (
        <div style={{
          display:"flex", alignItems:"center", gap:12,
          marginTop:24, width:"100%",
        }}>
          {(isStrength || isCore) && (
            <>
              <div style={S.logInputWrap}>
                <span style={S.logInputLabel}>KG</span>
                <input
                  style={S.logInput}
                  type="number" inputMode="decimal"
                  placeholder="—"
                  value={weight}
                  onChange={e=>setWeight(e.target.value)}
                />
              </div>
              <div style={{ fontSize:22, color:"#252530", fontWeight:300 }}>×</div>
            </>
          )}
          <div style={S.logInputWrap}>
            <span style={S.logInputLabel}>REPS</span>
            <input
              style={{...S.logInput, color: repsHasValue ? "#E8E8EC" : "#555"}}
              type="number" inputMode="numeric"
              placeholder={String(step.targetReps ?? "—")}
              value={repsHasValue ? reps : (step.targetReps ?? "")}
              onFocus={e=>{ if(!repsHasValue) e.target.select(); }}
              onChange={e=>setReps(e.target.value)}
            />
          </div>
        </div>
      )}

      {/* Controls */}
      <div style={{
        display:"flex", alignItems:"center", gap:isWork?10:16,
        marginTop: isWork ? 20 : 32,
        width:"100%",
      }}>
        {/* +30s */}
        <button style={S.controlBtnSm} onClick={()=>onAddTime(30)}>
          <Icon name="addTime" size={20} color="#555"/>
          <span style={{fontSize:11,color:"#555",fontWeight:700}}>+30s</span>
        </button>

        {/* Play / Pause */}
        <button
          style={{
            ...S.controlBtnLg,
            background: running ? "#1a1a22" : "#C8F03C",
            border: running ? "2px solid #2a2a34" : "2px solid #C8F03C",
          }}
          onClick={onPlayPause}
        >
          <Icon name={running?"pause":"play"} size={28} color={running?"#C8F03C":"#0D0D0F"}/>
        </button>

        {/* Work steps get TWO distinct actions: Skip (no log) and Set Complete (log + advance).
            Rest and prep steps keep a single Skip button — unchanged for rest,
            teal-tinted for prep to match its own colour rather than rest's purple. */}
        {isWork ? (
          <>
            <button style={S.controlBtnSmMuted} onClick={handleSkipOnly}>
              <Icon name="skip" size={18} color="#666"/>
              <span style={{fontSize:10,color:"#666",fontWeight:700}}>Skip</span>
            </button>
            <button
              style={{ ...S.controlBtnSm, background:"#C8F03C1a", border:"1px solid #C8F03C44" }}
              onClick={handleDone}
            >
              <Icon name="check" size={18} color="#C8F03C"/>
              <span style={{fontSize:10,color:"#C8F03C",fontWeight:700}}>Set Complete</span>
            </button>
          </>
        ) : (
          <button
            style={{
              ...S.controlBtnSm,
              background: isPrep ? "#5EEAD41a" : "#A78BFA1a",
              border: isPrep ? "1px solid #5EEAD444" : "1px solid #A78BFA44",
            }}
            onClick={handleDone}
          >
            <Icon name="skip" size={20} color={isPrep ? "#5EEAD4" : "#A78BFA"}/>
            <span style={{fontSize:11,color:isPrep ? "#5EEAD4" : "#A78BFA",fontWeight:700}}>Skip</span>
          </button>
        )}
      </div>

      {/* Next preview */}
      {step.subLabel && (
        <div style={{
          marginTop:24, padding:"10px 16px",
          background:"#111115", borderRadius:10,
          border:"1px solid #1c1c22", width:"100%",
        }}>
          <div style={{fontSize:10,color:"#383840",fontWeight:800,letterSpacing:"0.12em",marginBottom:3}}>COMING UP</div>
          <div style={{fontSize:13,color:"#777",fontWeight:600}}>{step.subLabel}</div>
        </div>
      )}

      {/* Swipe hint */}
      <div style={{marginTop:16, fontSize:11, color:"#252530", fontWeight:600, letterSpacing:"0.06em"}}>
        ← swipe to skip exercise
      </div>

      {/* Brief visual confirmation when swipe fires */}
      {swipeHint && (
        <div style={{
          position:"fixed", top:"50%", left:"50%",
          transform:"translate(-50%,-50%)",
          background:"rgba(200,240,60,0.15)", border:"1px solid #C8F03C44",
          borderRadius:16, padding:"12px 24px",
          color:"#C8F03C", fontSize:13, fontWeight:800,
          pointerEvents:"none", zIndex:999,
        }}>
          Next exercise →
        </div>
      )}
    </div>
  );
}

// ─── EXERCISE PICKER ─────────────────────────────────────────────────────────
function ExercisePicker({ type, onSelect, onClose, history }) {
  const [search, setSearch] = useState("");
  const [customEx, setCustomEx] = useState({});
  const [justAdded, setJustAdded] = useState(null);
  const inputRef = useRef(null);
  useEffect(()=>{ setTimeout(()=>inputRef.current?.focus(),100); setCustomEx(loadCustomExercises()); },[]);

  const baseList   = EXERCISE_LIBRARY[type] || [];
  const customList = customEx[type] || [];
  const fullList   = [...baseList, ...customList];
  const filtered   = fullList.filter(e=>e.toLowerCase().includes(search.toLowerCase()));

  const trimmedSearch = search.trim();
  const exactMatch = fullList.some(e=>e.toLowerCase()===trimmedSearch.toLowerCase());
  const showAddRow = trimmedSearch.length > 0 && !exactMatch;

  function handleAddNew() {
    if (!trimmedSearch) return;
    addCustomExercise(type, trimmedSearch);
    setJustAdded(trimmedSearch);
    onSelect(trimmedSearch);
    onClose();
  }

  return (
    <Portal>
    <div style={S.overlay} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={S.pickerBox}>
        <div style={S.modalHeader}>
          <span style={S.modalTitle}>Select Exercise</span>
          <button style={S.iconBtnSm} onClick={onClose}><Icon name="x" size={20} color="#888"/></button>
        </div>
        <div style={S.pickerSearchWrap}>
          <input ref={inputRef} style={S.searchInput} placeholder="Search or type to add new…"
            value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
        <div style={S.exerciseList}>
          {filtered.map(ex=>{
            const stats=calcStats(history[ex]);
            const isCustom = customList.includes(ex);
            return (
              <button key={ex} style={S.exerciseItem} onClick={()=>{onSelect(ex);onClose();}}>
                <span style={{display:"flex",alignItems:"center",gap:7}}>
                  <span style={{fontSize:14,fontWeight:600,color:"#E8E8EC"}}>{ex}</span>
                  {isCustom && <span style={S.customTag}>custom</span>}
                </span>
                {stats&&(
                  <span style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                    <span style={{display:"flex",alignItems:"center",gap:3,fontSize:11,fontWeight:700,color:"#FFB800"}}>
                      <Icon name="trophy" size={11} color="#FFB800"/> {stats.pb}kg
                    </span>
                    <span style={{fontSize:11,color:"#555"}}>avg {stats.avg}kg</span>
                  </span>
                )}
              </button>
            );
          })}

          {filtered.length===0 && !showAddRow && (
            <div style={{color:"#444",fontSize:13,padding:"20px",textAlign:"center"}}>No exercises found</div>
          )}

          {showAddRow && (
            <button style={S.addExerciseRow} onClick={handleAddNew}>
              <span style={S.addExerciseIcon}>
                <Icon name="plus" size={15} color="#0D0D0F"/>
              </span>

// ─── TAG PICKER (multi-select, anchored search + create new) ────────────────
function TagPicker({ selectedTags, onChange, onClose }) {
  const [search, setSearch] = useState("");
  const [customTags, setCustomTags] = useState([]);
  const inputRef = useRef(null);
  useEffect(()=>{ setTimeout(()=>inputRef.current?.focus(),100); setCustomTags(loadCustomTags()); },[]);

  const fullList = [...DEFAULT_TAGS, ...customTags];
  const filtered = fullList.filter(t=>t.label.toLowerCase().includes(search.toLowerCase()));

  const trimmedSearch = search.trim();
  const exactMatch = fullList.some(t=>t.label.toLowerCase()===trimmedSearch.toLowerCase());
  const showAddRow = trimmedSearch.length > 0 && !exactMatch;

  const isSelected = (label) => selectedTags.some(t=>t.label===label);

  function toggleTag(tag) {
    if (isSelected(tag.label)) {
      onChange(selectedTags.filter(t=>t.label!==tag.label));
    } else {
      onChange([...selectedTags, tag]);
    }
  }

  function handleAddNew() {
    if (!trimmedSearch) return;
    const newTag = { emoji:"🏷️", label:trimmedSearch };
    const updated = addCustomTag(newTag.emoji, newTag.label);
    setCustomTags(updated);
    onChange([...selectedTags, newTag]);
    setSearch("");
  }

  return (
    <Portal>
    <div style={S.overlay} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={S.pickerBox}>
        <div style={S.modalHeader}>
          <span style={S.modalTitle}>Workout Tags</span>
          <button style={S.iconBtnSm} onClick={onClose}><Icon name="x" size={20} color="#888"/></button>
        </div>
        <div style={S.pickerSearchWrap}>
          <input ref={inputRef} style={S.searchInput} placeholder="Search or type to add new…"
            value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
        <div style={S.exerciseList}>
          {filtered.map(tag=>{
            const selected = isSelected(tag.label);
            const color = tagColorFor(tag.label);
            return (
              <button key={tag.label} style={{...S.tagPickerItem, ...(selected?{borderColor:color+"77",background:color+"14"}:{})}}
                onClick={()=>toggleTag(tag)}>
                <span style={{display:"flex",alignItems:"center",gap:9}}>
                  <span style={{fontSize:17}}>{tag.emoji}</span>
                  <span style={{fontSize:14,fontWeight:600,color:"#E8E8EC"}}>{tag.label}</span>
                </span>
                <span style={{...S.tagCheckbox, ...(selected?{background:color,border:`1px solid ${color}`}:{})}}>
                  {selected && <Icon name="check" size={12} color="#0D0D0F"/>}
                </span>
              </button>
            );
          })}

          {filtered.length===0 && !showAddRow && (
            <div style={{color:"#444",fontSize:13,padding:"20px",textAlign:"center"}}>No tags found</div>
          )}

          {showAddRow && (
            <button style={S.addExerciseRow} onClick={handleAddNew}>
              <span style={S.addExerciseIcon}>
                <Icon name="plus" size={15} color="#0D0D0F"/>
              </span>
              <span style={{fontSize:14,fontWeight:700,color:"#FFB800"}}>
                Add "{trimmedSearch}"
              </span>
            </button>
          )}
        </div>
        <div style={{padding:"12px 16px 18px",flexShrink:0}}>
          <button style={S.saveBtn} onClick={onClose}>
            <Icon name="check" size={16} color="#0D0D0F"/> Done
          </button>
        </div>
      </div>
    </div>
    </Portal>
  );
}

// A single editable chip: shows a grey suggested value until the user types
// their own, which then commits and renders in white.
function SuggestChip({ value, suggested, onChange, unit, color="#E8E8EC", type="number" }) {
  const hasValue = value !== "" && value !== null && value !== undefined;
  return (
    <input
      style={{...S.chipInput, color: hasValue ? color : "#666"}}
      type={type} inputMode={type==="number" ? "decimal" : "text"}
      value={hasValue ? value : (suggested ?? "")}
      onFocus={e=>{ if(!hasValue) e.target.select(); }}
      onChange={e=>onChange(e.target.value)}
      placeholder={String(suggested ?? "—")}
    />
  );
}

// ─── EXERCISE ICON TILE (stand-in for a photo thumbnail) ─────────────────────
// ─── SWIPE TO DELETE (Apple-standard gesture) ────────────────────────────────
// Wraps any row; swipe left reveals a red delete action, matching iOS list behavior.
function SwipeToDelete({ children, onDelete, disabled=false }) {
  const [dragX, setDragX] = useState(0);
  const [revealed, setRevealed] = useState(false);
  const startX = useRef(0);
  const dragging = useRef(false);
  const DELETE_WIDTH = 72;

  function handleTouchStart(e) {
    if (disabled) return;
    startX.current = e.touches[0].clientX;
    dragging.current = true;
  }
  function handleTouchMove(e) {
    if (!dragging.current || disabled) return;
    const delta = e.touches[0].clientX - startX.current;
    const base = revealed ? -DELETE_WIDTH : 0;
    const next = Math.min(0, Math.max(-DELETE_WIDTH - 20, base + delta));
    setDragX(next);
  }
  function handleTouchEnd() {
    dragging.current = false;
    if (dragX < -DELETE_WIDTH/2) { setDragX(-DELETE_WIDTH); setRevealed(true); }
    else { setDragX(0); setRevealed(false); }
  }

  return (
    <div style={{ position:"relative", overflow:"hidden" }}>
      {dragX !== 0 && (
        <div style={S.swipeDeleteAction}>
          <button style={S.swipeDeleteBtn} onClick={()=>{ setDragX(0); setRevealed(false); onDelete(); }}>
            <Icon name="x" size={18} color="#fff"/>
            <span style={{fontSize:11,fontWeight:800,color:"#fff"}}>Delete</span>
          </button>
        </div>
      )}
      <div
        style={{ transform:`translateX(${dragX}px)`, transition: dragging.current ? "none" : "transform 0.2s ease", background:"#0D0D0F" }}
        onTouchStart={handleTouchStart}
        onTouchMove={handleTouchMove}
        onTouchEnd={handleTouchEnd}
        onClick={()=>{ if(revealed){ setDragX(0); setRevealed(false); } }}
      >
        {children}
      </div>
    </div>
  );
}

// ─── LONG PRESS PREVIEW (Apple-standard gesture) ─────────────────────────────
// Wraps a row; holding it shows a quick-peek card without opening the full editor.
function LongPressable({ children, previewContent, onTap }) {
  const [showPreview, setShowPreview] = useState(false);
  const timerRef = useRef(null);
  const movedRef = useRef(false);

  function start() {
    movedRef.current = false;
    timerRef.current = setTimeout(()=>{ if(!movedRef.current) setShowPreview(true); }, 450);
  }
  function cancel() { clearTimeout(timerRef.current); }
  function move() { movedRef.current = true; cancel(); }

  return (
    <>
      <div
        onTouchStart={start} onTouchMove={move} onTouchEnd={cancel}
        onMouseDown={start} onMouseUp={cancel} onMouseLeave={cancel}
        onClick={()=>{ if(!showPreview) onTap && onTap(); }}
      >
        {children}
      </div>
      {showPreview && (
        <Portal>
        <div style={S.overlay} onClick={()=>setShowPreview(false)}>
          <div style={S.previewCard} onClick={e=>e.stopPropagation()}>
            {previewContent}
            <button style={S.previewCloseBtn} onClick={()=>setShowPreview(false)}>Close</button>
          </div>
        </div>
        </Portal>
      )}
    </>
  );
}

// ─── DRAGGABLE BLOCK LIST (tap-hold-and-drag reordering) ─────────────────────
// Wraps a sequence of blocks. Each block exposes a drag handle (the 6-dot grip
// in ListSectionHeader); pressing and holding that handle for ~250ms arms the
// drag, then moving your finger reorders blocks live by swapping past whichever
// block your finger is currently over. Lifting commits the new order.
function DraggableBlockList({ order, renderBlock, onReorder }) {
  const [draggingKey, setDraggingKey] = useState(null);
  const [dragY, setDragY] = useState(0);
  const armTimerRef = useRef(null);
  const startYRef = useRef(0);
  const rowRefs = useRef({});
  const orderRef = useRef(order);
  orderRef.current = order;

  function armDrag(key, clientY) {
    startYRef.current = clientY;
    armTimerRef.current = setTimeout(()=>{
      setDraggingKey(key);
      setDragY(0);
    }, 250);
  }
  function cancelArm() {
    clearTimeout(armTimerRef.current);
  }
  function handleMove(clientY) {
    if (!draggingKey) return;
    const delta = clientY - startYRef.current;
    setDragY(delta);

    // Find which other block's row centre we've crossed, and swap if so.
    const myKey = draggingKey;
    const myEl = rowRefs.current[myKey];
    if (!myEl) return;
    const myRect = myEl.getBoundingClientRect();
    const myCentre = myRect.top + myRect.height/2 + delta;

    for (const otherKey of orderRef.current) {
      if (otherKey === myKey) continue;
      const otherEl = rowRefs.current[otherKey];
      if (!otherEl) continue;
      const r = otherEl.getBoundingClientRect();
      const otherCentre = r.top + r.height/2;
      if (myCentre > r.top && myCentre < r.bottom) {
        onReorder(myKey, otherKey);
        startYRef.current = clientY;
        setDragY(0);
        break;
      }
    }
  }
  function handleEnd() {
    cancelArm();
    setDraggingKey(null);
    setDragY(0);
  }

  return (
    <>
      {order.map(key=>(
        <div
          key={key}
          ref={el=>rowRefs.current[key]=el}
          style={{
            position:"relative",
            transform: draggingKey===key ? `translateY(${dragY}px) scale(1.01)` : "none",
            zIndex: draggingKey===key ? 50 : 1,
            transition: draggingKey===key ? "none" : "transform 0.15s ease",
            boxShadow: draggingKey===key ? "0 8px 24px rgba(0,0,0,0.5)" : "none",
            background: draggingKey===key ? "#0D0D0F" : "none",
          }}
          onTouchStartCapture={e=>{}}
          onTouchMove={e=>{ if(draggingKey===key) handleMove(e.touches[0].clientY); }}
          onTouchEnd={()=>{ if(draggingKey===key) handleEnd(); }}
          onMouseMove={e=>{ if(draggingKey===key) handleMove(e.clientY); }}
          onMouseUp={()=>{ if(draggingKey===key) handleEnd(); }}
        >
          {renderBlock(key, {
            dragHandleProps: {
              onTouchStart: e=>{ e.stopPropagation(); armDrag(key, e.touches[0].clientY); },
              onTouchEnd: cancelArm,
              onMouseDown: e=>{ e.stopPropagation(); armDrag(key, e.clientY); },
              onMouseUp: cancelArm,
            },
            isDragging: draggingKey===key,
          })}
        </div>
      ))}
    </>
  );
}

// ─── WEEK STRIP (Mon-Sun, completion badges) ─────────────────────────────────
function WeekStrip({ sessions, onDayTap }) {
  const today = new Date();
  // Find this week's Monday
  const dow = (today.getDay() + 6) % 7; // 0=Mon
  const monday = new Date(today);
  monday.setDate(today.getDate() - dow);

  const days = Array.from({length:7}, (_,i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    const key = d.toISOString().slice(0,10);
    return {
      key,
      label: d.toLocaleDateString("en-GB",{weekday:"short"}),
      num: d.getDate(),
      isToday: key === today.toISOString().slice(0,10),
      completed: !!sessions[key],
    };
  });

  return (
    <div style={S.weekStrip}>
      {days.map(d=>(
        <button key={d.key} style={S.weekDayCol} onClick={()=>onDayTap && onDayTap(d.key)}>
          <span style={{...S.weekDayLabel, ...(d.isToday?{color:"#E8E8EC",fontWeight:800}:{})}}>{d.label}</span>
          {d.completed ? (
            <div style={S.weekDayBadge}>
              <Icon name="check" size={13} color="#0D0D0F"/>
            </div>
          ) : (
            <span style={{...S.weekDayNum, ...(d.isToday?S.weekDayNumToday:{})}}>{d.num}</span>
          )}
        </button>
      ))}
    </div>
  );
}

// ─── CALENDAR MODULE ──────────────────────────────────────────────────────────
function CalendarModule({ sessions, schedule={}, templates=[], onDayTap }) {
  const [viewDate, setViewDate] = useState(new Date());
  const year  = viewDate.getFullYear();
  const month = viewDate.getMonth();
  const monthName = viewDate.toLocaleDateString("en-GB",{month:"long"}).toUpperCase();

  const firstDay = new Date(year, month, 1);
  // Monday-first index (0=Mon ... 6=Sun)
  const startOffset = (firstDay.getDay() + 6) % 7;
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  const todayKey = new Date().toISOString().slice(0,10);
  const cells = [];
  for (let i = 0; i < startOffset; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  const keyFor = (d) => `${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;

  return (
    <div style={S.calendarCard}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18}}>
        <span className="block-display" style={{fontSize:26,color:"#E8E8EC"}}>{monthName}</span>
        <div style={{display:"flex",gap:6}}>
          <button style={S.calNavBtn} onClick={()=>setViewDate(new Date(year,month-1,1))}>
            <Icon name="back" size={15} color="#666"/>
          </button>
          <button style={S.calNavBtn} onClick={()=>setViewDate(new Date(year,month+1,1))}>
            <span style={{display:"flex",transform:"rotate(-90deg)"}}><Icon name="chevDown" size={15} color="#666"/></span>
          </button>
        </div>
      </div>
      <div style={S.calWeekRow}>
        {["M","T","W","T","F","S","S"].map((d,i)=>(
          <div key={i} style={S.calWeekDay}>{d}</div>
        ))}
      </div>
      <div style={S.calGrid}>
        {cells.map((d,i)=>{
          if (d===null) return <div key={i} style={S.calCell}/>;
          const key = keyFor(d);
          const isToday = key === todayKey;
          const isCompleted = !!sessions[key];
          const isScheduled = !!schedule[key];
          return (
            <button key={i} style={S.calCellBtn} onClick={()=>onDayTap && onDayTap(key)}>
              <div style={{
                ...S.calDayNum,
                ...(isToday ? S.calDayToday : {}),
                ...(isCompleted && !isToday ? S.calDayLogged : {}),
              }}>
                {d}
              </div>
              {isCompleted ? (
                <div style={{...S.calDot, background: isToday ? "#E8E8EC" : "#C8F03C"}}/>
              ) : isScheduled ? (
                <div style={S.calDotScheduled}/>
              ) : null}
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ─── PROGRESS RING (header) ──────────────────────────────────────────────────
function ProgressRing({ total, done }) {
  const pct=total===0?0:Math.round((done/total)*100);
  const r=28,circ=2*Math.PI*r,offset=circ-(pct/100)*circ;
  return (
    <div style={{position:"relative",width:64,height:64,flexShrink:0}}>
      <svg width={64} height={64}>
        <circle cx={32} cy={32} r={r} fill="none" stroke="#1a1a1f" strokeWidth={5}/>
        <circle cx={32} cy={32} r={r} fill="none" stroke="#C8F03C" strokeWidth={5}
          strokeDasharray={circ} strokeDashoffset={offset}
          strokeLinecap="round" transform="rotate(-90 32 32)"
          style={{transition:"stroke-dashoffset 0.5s ease"}}/>
      </svg>
      <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",fontSize:12,fontWeight:800,color:"#C8F03C",fontFamily:"monospace"}}>
        {pct}%
      </div>
    </div>
  );
}

              const logs=history[ex];
              return (
                <div key={ex} style={S.historyItem}>
                  <div style={{fontSize:15,fontWeight:800,color:"#E8E8EC",marginBottom:8}}>{ex}</div>
                  <div style={{display:"flex",gap:12,marginBottom:10,flexWrap:"wrap"}}>
                    <span style={{display:"flex",alignItems:"center",gap:4,fontSize:12,fontWeight:700,color:"#FFB800"}}>
                      <Icon name="trophy" size={12} color="#FFB800"/> PB {stats.pb}kg
                    </span>
                    <span style={{display:"flex",alignItems:"center",gap:4,fontSize:12,color:"#888"}}>
                      <Icon name="history" size={12} color="#888"/> Avg {stats.avg}kg
                    </span>
                    <span style={{fontSize:12,color:"#444"}}>{logs.length} session{logs.length!==1?"s":""}</span>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:5}}>
                    {logs.slice(-5).reverse().map((l,i)=>(
                      <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"5px 8px",background:"#0a0a0e",borderRadius:7}}>
                        <span style={{fontSize:11,color:"#444",width:48,flexShrink:0}}>{new Date(l.date).toLocaleDateString("en-GB",{day:"2-digit",month:"short"})}</span>
                        <span style={{fontSize:13,fontWeight:600,color:"#888",fontFamily:"monospace"}}>{l.weight}kg × {l.reps}</span>
                        {i===0&&parseFloat(l.weight)===stats.pb&&<span style={{background:"#FFB800",color:"#0D0D0F",fontSize:9,fontWeight:900,borderRadius:4,padding:"2px 5px"}}>PB</span>}
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
    </Portal>
  );
}

// New unified set shape — every exercise gets both a rep target and a timer,
// regardless of type. targetReps/targetTime are suggested (grey); logged* are
// what the user actually typed (white) once confirmed.
const makeSet = (targetReps=10, targetTime=40) => ({
  targetReps, targetTime,
  loggedReps: "", loggedWeight: "", loggedTime: "", effort: "",
  done: false,
});
// Builds an exercise with N sets, each carrying the given suggested targets.
const mkEx = (name, targetReps=10, targetTime=40, setCount=3) => ({
  name,
  sets: Array.from({length:setCount}, () => makeSet(targetReps, targetTime)),
  timings: null,
});

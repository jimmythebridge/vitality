<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>VITALITY · Workout Tracker</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-512.png"/>
<meta name="theme-color" content="#0D0D0F"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #0D0D0F; overscroll-behavior: none; }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; color: #E8E8EC; -webkit-font-smoothing: antialiased; }
  #root { height: 100%; }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
  input[type=number] { -moz-appearance: textfield; }
  ::-webkit-scrollbar { width: 0; }
  button { font-family: inherit; }
  * { -webkit-tap-highlight-color: transparent; }

  @keyframes pulse-ring {
    0%   { transform: scale(1);    opacity: 0.6; }
    50%  { transform: scale(1.06); opacity: 0.2; }
    100% { transform: scale(1);    opacity: 0.6; }
  }
  @keyframes flash-in {
    0%   { opacity: 0; transform: scale(0.92); }
    100% { opacity: 1; transform: scale(1); }
  }
  .anim-flash { animation: flash-in 0.22s ease-out both; }

  .timer-ring-pulse { animation: pulse-ring 1.8s ease-in-out infinite; }

  @keyframes progress-sweep {
    from { stroke-dashoffset: var(--dash-start); }
    to   { stroke-dashoffset: var(--dash-end); }
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ─── EXERCISE LIBRARY ────────────────────────────────────────────────────────
const EXERCISE_LIBRARY = {
  warmup: [
    "World's Greatest Stretch","Hip 90/90","Thread the Needle","Cat-Cow","Thoracic Rotation",
    "Ankle Circles","Shoulder Circles","Leg Swings","Arm Circles","Inchworm",
    "Hip Flexor Stretch","Glute Bridge","Dead Bug","Band Pull-Apart","Jumping Jacks",
    "Bear Crawl","Cossack Squat","Wall Slides","Foam Roll Thoracic","Hip Circles",
  ],
  strength: [
    "Bench Press","Squat","Deadlift","Overhead Press","Barbell Row","Pull-Up","Dip",
    "Incline Bench Press","Romanian Deadlift","Front Squat","Bulgarian Split Squat",
    "Lat Pulldown","Cable Row","Chest Fly","Tricep Pushdown","Bicep Curl","Hammer Curl",
    "Lateral Raise","Face Pull","Leg Press","Leg Curl","Leg Extension","Calf Raise",
    "Hip Thrust","Farmers Walk","Turkish Get-Up","Kettlebell Swing","Box Jump",
    "Lunges","Step-Up","Goblet Squat","Sumo Deadlift","Hack Squat","Pendlay Row",
    "Seated Row","Arnold Press","Skull Crushers","Close-Grip Bench","Preacher Curl",
    "Cable Fly","Incline Dumbbell Curl","Overhead Tricep Extension","Reverse Fly",
    "Trap Bar Deadlift","Zercher Squat","Good Morning","Nordic Curl","GHD Raise",
  ],
  cooldown: [
    "Pigeon Pose","Hamstring Stretch","Quad Stretch","Hip Flexor Lunge","Child's Pose",
    "Seated Forward Fold","Lying Spinal Twist","Doorway Chest Stretch","Cross-Body Shoulder Stretch",
    "Calf Stretch","Butterfly Stretch","Neck Side Stretch","Foam Roll Quads","Foam Roll Thoracic",
    "Downward Dog","Supine Glute Stretch","Figure Four","Couch Stretch",
    "90/90 Hip Stretch","Shoulder Sleeper Stretch","Thoracic Extension on Foam Roller",
  ],
};

// ─── SMART DEFAULTS ──────────────────────────────────────────────────────────
const COMPOUND = ["Bench Press","Squat","Deadlift","Overhead Press","Barbell Row","Pull-Up",
  "Incline Bench Press","Romanian Deadlift","Front Squat","Bulgarian Split Squat","Dip",
  "Hip Thrust","Farmers Walk","Turkish Get-Up","Box Jump","Sumo Deadlift","Hack Squat",
  "Pendlay Row","Trap Bar Deadlift","Zercher Squat","Good Morning","Nordic Curl","GHD Raise",
  "Leg Press","Goblet Squat","Lunges","Step-Up"];

function defaultTimings(exerciseName) {
  const isCompound = COMPOUND.includes(exerciseName);
  const isWarmup   = EXERCISE_LIBRARY.warmup.includes(exerciseName);
  const isCooldown = EXERCISE_LIBRARY.cooldown.includes(exerciseName);
  if (isWarmup || isCooldown) return { work: 40, rest: 10 };
  if (isCompound)              return { work: 60, rest: 90 };
  return                              { work: 45, rest: 60 };
}

// ─── STORAGE ─────────────────────────────────────────────────────────────────
const STORAGE_KEY = "vitality_workout_history_v3";
function saveHistory(h) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(h)); } catch {} }
function loadHistory()  { try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : {}; } catch { return {}; } }

function calcStats(logs) {
  if (!logs?.length) return null;
  const weights = logs.map(l => parseFloat(l.weight)).filter(w => !isNaN(w) && w > 0);
  if (!weights.length) return null;
  return {
    pb:         Math.max(...weights),
    avg:        Math.round((weights.reduce((a,b)=>a+b,0)/weights.length)*10)/10,
    lastWeight: weights[weights.length-1],
    logCount:   logs.length,
  };
}

// ─── AUDIO ───────────────────────────────────────────────────────────────────
function beep(freq=880, dur=0.12, type="sine", vol=0.4) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type; osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start(); osc.stop(ctx.currentTime + dur);
  } catch {}
}
function beepWork() { beep(660, 0.10, "sine", 0.3); setTimeout(()=>beep(880,0.15,"sine",0.4),120); }
function beepRest() { beep(440, 0.15, "sine", 0.35); setTimeout(()=>beep(330,0.20,"sine",0.3),150); }
function beepCountdown() { beep(1047, 0.08, "sine", 0.2); }

// ─── FLAT WORKOUT QUEUE ──────────────────────────────────────────────────────
// Builds a flat ordered list of "steps" from the workout structure.
// Each step: { id, phase, label, subLabel, exerciseKey, setIndex, type:"work"|"rest"|"hold" }
function buildQueue(workout) {
  const steps = [];
  let id = 0;

  // Warmup
  workout.warmup.forEach((item, i) => {
    const t = defaultTimings(item.name);
    steps.push({ id: id++, phase:"warmup", type:"work", label: item.name, subLabel:"Warm-up", exerciseKey:`warmup-${i}`, setIndex:0, work:t.work, rest:t.rest });
    steps.push({ id: id++, phase:"warmup", type:"rest", label:"Rest",      subLabel:`Next: ${workout.warmup[i+1]?.name || "Strength work"}`, exerciseKey:`warmup-${i}`, setIndex:0, work:t.work, rest:t.rest });
  });

  // Supersets
  workout.supersets.forEach((ss, si) => {
    const totalSets = ss.exercises[0]?.sets?.length || 3;
    for (let setIdx = 0; setIdx < totalSets; setIdx++) {
      ss.exercises.forEach((ex, ei) => {
        const t = ex.timings || defaultTimings(ex.name);
        const isLastExInSet   = ei === ss.exercises.length - 1;
        const isLastSetOfSS   = setIdx === totalSets - 1;
        const nextLabel = !isLastExInSet
          ? ss.exercises[ei+1].name
          : isLastSetOfSS
            ? (workout.supersets[si+1] ? `Superset ${si+2}` : "Cool down")
            : `Set ${setIdx+2} · ${ss.exercises[0].name}`;

        steps.push({
          id: id++, phase:"strength", type:"work",
          label: ex.name,
          subLabel: `Superset ${si+1} · Set ${setIdx+1}/${totalSets}`,
          exerciseKey: `ss${si}-ex${ei}`,
          setIndex: setIdx,
          ssIndex: si, exIndex: ei,
          work: t.work, rest: t.rest,
        });
        steps.push({
          id: id++, phase:"strength", type:"rest",
          label: "Rest",
          subLabel: `Next: ${nextLabel}`,
          exerciseKey: `ss${si}-ex${ei}`,
          setIndex: setIdx,
          ssIndex: si, exIndex: ei,
          work: t.work, rest: t.rest,
          isLastExInSet, isLastSetOfSS,
        });
      });
    }
  });

  // Cooldown
  workout.cooldown.forEach((item, i) => {
    const t = defaultTimings(item.name);
    steps.push({ id: id++, phase:"cooldown", type:"work", label: item.name, subLabel:"Cool-down stretch", exerciseKey:`cd-${i}`, setIndex:0, work:t.work, rest:t.rest });
    if (i < workout.cooldown.length - 1) {
      steps.push({ id: id++, phase:"cooldown", type:"rest", label:"Rest", subLabel:`Next: ${workout.cooldown[i+1]?.name}`, exerciseKey:`cd-${i}`, setIndex:0, work:t.work, rest:t.rest });
    }
  });

  return steps;
}

// ─── ICONS ───────────────────────────────────────────────────────────────────
function Icon({ name, size=18, color="currentColor" }) {
  const p = { width:size, height:size, fill:"none", stroke:color, strokeWidth:"2", strokeLinecap:"round", strokeLinejoin:"round", viewBox:"0 0 24 24" };
  const d = {
    plus:      <svg {...p} strokeWidth="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
    minus:     <svg {...p} strokeWidth="2.5"><line x1="5" y1="12" x2="19" y2="12"/></svg>,
    check:     <svg {...p} strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg>,
    x:         <svg {...p} strokeWidth="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
    chevDown:  <svg {...p} strokeWidth="2.5"><polyline points="6 9 12 15 18 9"/></svg>,
    play:      <svg {...p} strokeWidth="2"><polygon points="5 3 19 12 5 21 5 3" fill={color} stroke="none"/></svg>,
    pause:     <svg {...p} strokeWidth="2.5"><rect x="6" y="4" width="4" height="16" fill={color} stroke="none"/><rect x="14" y="4" width="4" height="16" fill={color} stroke="none"/></svg>,
    skip:      <svg {...p} strokeWidth="2"><polygon points="5 4 15 12 5 20 5 4" fill={color} stroke="none"/><line x1="19" y1="5" x2="19" y2="19" stroke={color} strokeWidth="2.5"/></svg>,
    history:   <svg {...p}><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>,
    refresh:   <svg {...p}><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>,
    note:      <svg {...p}><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>,
    trophy:    <svg {...p}><path d="M6 9H4.5a2.5 2.5 0 010-5H6"/><path d="M18 9h1.5a2.5 2.5 0 000-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0012 0V2z"/></svg>,
    dumbbell:  <svg {...p}><path d="M6 4v16M18 4v16M4 8h4M16 8h4M4 16h4M16 16h4M8 12h8"/></svg>,
    flame:     <svg width={size} height={size} viewBox="0 0 24 24" fill={color} stroke="none"><path d="M12 2C8 8 6 11 6 14a6 6 0 0012 0c0-3-2-6-6-12zm0 17a4 4 0 01-2.83-6.83C10 11.5 11 10 12 7c1 3 2 4.5 2.83 3.17A4 4 0 0112 19z"/></svg>,
    bolt:      <svg width={size} height={size} viewBox="0 0 24 24" fill={color} stroke="none"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
    timer:     <svg {...p}><circle cx="12" cy="13" r="8"/><polyline points="12 9 12 13 14.5 15.5"/><path d="M10 2h4"/><path d="M21 5l-1.5 1.5"/></svg>,
    addTime:   <svg {...p} strokeWidth="2"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>,
    settings:  <svg {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>,

  };
  return d[name] || null;
}

// ─── CIRCULAR TIMER RING ─────────────────────────────────────────────────────
function TimerRing({ seconds, total, phase }) {
  const R = 108;
  const CIRC = 2 * Math.PI * R;
  const pct = total > 0 ? seconds / total : 1;
  const offset = CIRC * (1 - pct);
  const isRest = phase === "rest";
  const color = isRest ? "#A78BFA" : "#00E5FF";
  const mins = Math.floor(seconds / 60);
  const secs = seconds % 60;
  const timeStr = mins > 0 ? `${mins}:${String(secs).padStart(2,"0")}` : String(seconds);
  const warn = seconds <= 3 && seconds > 0;

  return (
    <div style={{ position:"relative", width:260, height:260, flexShrink:0 }}>
      {/* Pulse rings when warning */}
      {warn && (
        <div className="timer-ring-pulse" style={{
          position:"absolute", inset:0, borderRadius:"50%",
          border:`3px solid ${color}`, opacity:0.4,
        }}/>
      )}
      <svg width={260} height={260} style={{ position:"absolute", inset:0 }}>
        {/* Track */}
        <circle cx={130} cy={130} r={R} fill="none" stroke="#1a1a20" strokeWidth={10}/>
        {/* Progress */}
        <circle
          cx={130} cy={130} r={R}
          fill="none"
          stroke={color}
          strokeWidth={10}
          strokeLinecap="round"
          strokeDasharray={CIRC}
          strokeDashoffset={offset}
          transform="rotate(-90 130 130)"
          style={{ transition: "stroke-dashoffset 1s linear, stroke 0.3s" }}
        />
      </svg>
      {/* Centre content */}
      <div style={{
        position:"absolute", inset:0,
        display:"flex", flexDirection:"column",
        alignItems:"center", justifyContent:"center", gap:2,
      }}>
        <div style={{
          fontSize: warn ? 52 : 58,
          fontWeight: 900, fontFamily:"monospace",
          color: warn ? "#FF4444" : color,
          letterSpacing:"-2px",
          transition:"color 0.2s",
          lineHeight:1,
        }}>{timeStr}</div>
        <div style={{
          fontSize:11, fontWeight:800, letterSpacing:"0.18em",
          color: isRest ? "#7c6bd4" : "#0099bb",
          marginTop:4,
        }}>{isRest ? "REST" : "WORK"}</div>
      </div>
    </div>
  );
}

// ─── TIMER SCREEN ─────────────────────────────────────────────────────────────
function TimerScreen({ step, secondsLeft, totalSeconds, running, onPlayPause, onSkip, onAddTime, workout, onLogSet, onExit }) {
  const isWork = step.type === "work";
  const isRest = step.type === "rest";
  const isStrength = step.phase === "strength";

  // For strength work steps, get the current set data
  const [weight, setWeight] = useState("");
  const [reps, setReps]     = useState("");

  const phaseColor = {
    warmup:   "#FF6B35",
    strength: isRest ? "#A78BFA" : "#00E5FF",
    cooldown: "#A78BFA",
  }[step.phase] || "#00E5FF";

  const handleDone = () => {
    if (isStrength && isWork && step.ssIndex !== undefined) {
      onLogSet(step.ssIndex, step.exIndex, step.setIndex, { weight, reps });
    }
    onSkip();
  };

  return (
    <div className="anim-flash" style={{
      display:"flex", flexDirection:"column", alignItems:"center",
      padding:"0 24px 32px",
      minHeight:"100%",
      background:"#0D0D0F",
    }}>

      {/* Top bar */}
      <div style={{
        display:"flex", alignItems:"center", justifyContent:"space-between",
        width:"100%", padding:"14px 0 8px",
      }}>
        <button style={S.iconBtnSm} onClick={onExit}>
          <Icon name="back" size={20} color="#666"/>
        </button>
        <div style={{ fontSize:11, fontWeight:800, letterSpacing:"0.15em", color:"#383840" }}>
          {step.subLabel?.toUpperCase()}
        </div>
        <div style={{ width:36 }}/>
      </div>

      {/* Exercise name */}
      <div style={{
        fontSize: step.label.length > 18 ? 22 : 26,
        fontWeight:900, textAlign:"center",
        color:"#E8E8EC", marginBottom:4, marginTop:8,
        letterSpacing:"-0.5px",
        lineHeight:1.2,
      }}>{step.label}</div>

      {/* Phase pill */}
      <div style={{
        background: phaseColor + "1a",
        border:`1px solid ${phaseColor}44`,
        borderRadius:20, padding:"3px 12px", marginBottom:28,
        fontSize:11, fontWeight:800, color:phaseColor, letterSpacing:"0.1em",
      }}>
        {isRest ? "REST" : step.phase === "warmup" ? "WARM UP" : step.phase === "cooldown" ? "COOL DOWN" : "WORK SET"}
      </div>

      {/* Ring */}
      <TimerRing seconds={secondsLeft} total={totalSeconds} phase={step.type}/>

      {/* Log inputs — only on strength WORK steps */}
      {isStrength && isWork && (
        <div style={{
          display:"flex", alignItems:"center", gap:12,
          marginTop:24, width:"100%",
        }}>
          <div style={S.logInputWrap}>
            <span style={S.logInputLabel}>KG</span>
            <input
              style={S.logInput}
              type="number" inputMode="decimal"
              placeholder="—"
              value={weight}
              onChange={e=>setWeight(e.target.value)}
            />
          </div>
          <div style={{ fontSize:22, color:"#252530", fontWeight:300 }}>×</div>
          <div style={S.logInputWrap}>
            <span style={S.logInputLabel}>REPS</span>
            <input
              style={S.logInput}
              type="number" inputMode="numeric"
              placeholder="—"
              value={reps}
              onChange={e=>setReps(e.target.value)}
            />
          </div>
        </div>
      )}

      {/* Controls */}
      <div style={{
        display:"flex", alignItems:"center", gap:16,
        marginTop: isStrength && isWork ? 20 : 32,
        width:"100%",
      }}>
        {/* +30s */}
        <button style={S.controlBtnSm} onClick={()=>onAddTime(30)}>
          <Icon name="addTime" size={20} color="#555"/>
          <span style={{fontSize:11,color:"#555",fontWeight:700}}>+30s</span>
        </button>

        {/* Play / Pause */}
        <button
          style={{
            ...S.controlBtnLg,
            background: running ? "#1a1a22" : "#00E5FF",
            border: running ? "2px solid #2a2a34" : "2px solid #00E5FF",
          }}
          onClick={onPlayPause}
        >
          <Icon name={running?"pause":"play"} size={28} color={running?"#00E5FF":"#0D0D0F"}/>
        </button>

        {/* Skip / Done */}
        <button
          style={{
            ...S.controlBtnSm,
            background: isWork ? "#00E5FF1a" : "#A78BFA1a",
            border: `1px solid ${isWork?"#00E5FF44":"#A78BFA44"}`,
          }}
          onClick={handleDone}
        >
          <Icon name="skip" size={20} color={isWork?"#00E5FF":"#A78BFA"}/>
          <span style={{fontSize:11,color:isWork?"#00E5FF":"#A78BFA",fontWeight:700}}>
            {isWork ? "Done" : "Skip"}
          </span>
        </button>
      </div>

      {/* Next preview */}
      {step.subLabel && (
        <div style={{
          marginTop:24, padding:"10px 16px",
          background:"#111115", borderRadius:10,
          border:"1px solid #1c1c22", width:"100%",
        }}>
          <div style={{fontSize:10,color:"#383840",fontWeight:800,letterSpacing:"0.12em",marginBottom:3}}>COMING UP</div>
          <div style={{fontSize:13,color:"#777",fontWeight:600}}>{step.subLabel}</div>
        </div>
      )}
    </div>
  );
}

// ─── EXERCISE PICKER ─────────────────────────────────────────────────────────
function ExercisePicker({ type, onSelect, onClose, history }) {
  const [search, setSearch] = useState("");
  const inputRef = useRef(null);
  useEffect(()=>{ setTimeout(()=>inputRef.current?.focus(),100); },[]);
  const list = EXERCISE_LIBRARY[type] || [];
  const filtered = list.filter(e=>e.toLowerCase().includes(search.toLowerCase()));

  return (
    <div style={S.overlay} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={S.modalBox}>
        <div style={S.modalHeader}>
          <span style={S.modalTitle}>Select Exercise</span>
          <button style={S.iconBtnSm} onClick={onClose}><Icon name="x" size={20} color="#888"/></button>
        </div>
        <div style={{padding:"10px 16px 0"}}>
          <input ref={inputRef} style={S.searchInput} placeholder="Search…"
            value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
        <div style={S.exerciseList}>
          {filtered.map(ex=>{
            const stats=calcStats(history[ex]);
            return (
              <button key={ex} style={S.exerciseItem} onClick={()=>{onSelect(ex);onClose();}}>
                <span style={{fontSize:14,fontWeight:600,color:"#E8E8EC"}}>{ex}</span>
                {stats&&(
                  <span style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                    <span style={{display:"flex",alignItems:"center",gap:3,fontSize:11,fontWeight:700,color:"#FFB800"}}>
                      <Icon name="trophy" size={11} color="#FFB800"/> {stats.pb}kg
                    </span>

                  </span>

}

// ─── PROGRESS RING (header) ──────────────────────────────────────────────────
function ProgressRing({ total, done }) {
  const pct=total===0?0:Math.round((done/total)*100);
  const r=28,circ=2*Math.PI*r,offset=circ-(pct/100)*circ;
  return (
    <div style={{position:"relative",width:64,height:64,flexShrink:0}}>
      <svg width={64} height={64}>
        <circle cx={32} cy={32} r={r} fill="none" stroke="#1a1a1f" strokeWidth={5}/>
        <circle cx={32} cy={32} r={r} fill="none" stroke="#00E5FF" strokeWidth={5}
          strokeDasharray={circ} strokeDashoffset={offset}
          strokeLinecap="round" transform="rotate(-90 32 32)"
          style={{transition:"stroke-dashoffset 0.5s ease"}}/>
      </svg>
      <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",fontSize:12,fontWeight:800,color:"#00E5FF",fontFamily:"monospace"}}>
        {pct}%
      </div>
    </div>
  );
}

const makeSet=()=>({weight:"",reps:"",done:false});
const defaultWorkout=()=>({

    {exercises:[{name:"Overhead Press",sets:[makeSet(),makeSet(),makeSet()],timings:null},{name:"Pull-Up",sets:[makeSet(),makeSet(),makeSet()],timings:null}]},
  ],

    {name:"Pigeon Pose",done:false},
    {name:"Hamstring Stretch",done:false},
    {name:"Child's Pose",done:false},
  ],
});

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [workout,setWorkout]         = useState(defaultWorkout);
  const [history,setHistory]         = useState({});
  const [showHistory,setShowHistory] = useState(false);
  const [saved,setSaved]             = useState(false);
  const [activeTab,setActiveTab]     = useState("warmup");

  // Timer state
  const [timerActive,setTimerActive]         = useState(false);
  const [queue,setQueue]                     = useState([]);
  const [queueIdx,setQueueIdx]               = useState(0);
  const [secondsLeft,setSecondsLeft]         = useState(0);
  const [totalSeconds,setTotalSeconds]       = useState(0);
  const [running,setRunning]                 = useState(false);
  const intervalRef                          = useRef(null);
  const secondsRef                           = useRef(0);

  useEffect(()=>{ setHistory(loadHistory()); },[]);

  // ── Timer tick ──
  useEffect(()=>{
    if(!timerActive) return;
    if(running){
      intervalRef.current = setInterval(()=>{
        secondsRef.current -= 1;
        if(secondsRef.current <= 3 && secondsRef.current > 0) beepCountdown();
        if(secondsRef.current <= 0){
          clearInterval(intervalRef.current);
          advanceQueue(false);
        } else {
          setSecondsLeft(secondsRef.current);
        }
      },1000);
    } else {
      clearInterval(intervalRef.current);
    }
    return ()=>clearInterval(intervalRef.current);
  },[running,timerActive,queueIdx]);

  function startTimer(idx, q) {
    clearInterval(intervalRef.current);
    const step = q[idx];
    if(!step){ setTimerActive(false); return; }
    const dur = step.type==="work" ? step.work : step.rest;
    secondsRef.current = dur;
    setSecondsLeft(dur);
    setTotalSeconds(dur);
    setQueueIdx(idx);
    setRunning(true);
  }

  function advanceQueue(manual=false) {
    clearInterval(intervalRef.current);
    const step = queue[queueIdx];
    const isWork = step?.type==="work";

    if(isWork) beepWork(); else beepRest();

    const next = queueIdx + 1;
    if(next >= queue.length){
      setTimerActive(false);
      setRunning(false);
      return;
    }
    startTimer(next, queue);
  }

  function launchTimer() {
    const q = buildQueue(workout);
    setQueue(q);
    setTimerActive(true);
    setQueueIdx(0);
    const dur = q[0]?.work || 60;
    secondsRef.current = dur;
    setSecondsLeft(dur);
    setTotalSeconds(dur);
    setRunning(true);
  }

  function handleAddTime(secs) {
    secondsRef.current += secs;
    setSecondsLeft(s=>s+secs);
  }

  function handlePlayPause() { setRunning(r=>!r); }

  function handleSkip() { advanceQueue(true); }

  function handleLogSet(ssIdx, exIdx, setIdx, { weight, reps }) {
    if(!weight && !reps) return;
    const w={...workout,supersets:workout.supersets.map((ss,si)=>
      si!==ssIdx?ss:{...ss,exercises:ss.exercises.map((ex,ei)=>
        ei!==exIdx?ex:{...ex,sets:ex.sets.map((s,i)=>
          i!==setIdx?s:{...s,weight:weight||s.weight,reps:reps||s.reps,done:true}
        )}
      )}
    )};
    setWorkout(w);
  }

  // ── Workout editing helpers ──
  const updateWarmup   = (i,item)=>setWorkout(w=>({...w,warmup:w.warmup.map((x,j)=>j===i?item:x)}));
  const updateCooldown = (i,item)=>setWorkout(w=>({...w,cooldown:w.cooldown.map((x,j)=>j===i?item:x)}));
  const updateSuperset = (i,ss)  =>setWorkout(w=>({...w,supersets:w.supersets.map((x,j)=>j===i?ss:x)}));

  const countSets=()=>{
    let total=0,done=0;
    workout.warmup.forEach(e=>{total++;if(e.done)done++;});
    workout.supersets.forEach(ss=>ss.exercises.forEach(ex=>ex.sets.forEach(s=>{total++;if(s.done)done++;})));
    workout.cooldown.forEach(e=>{total++;if(e.done)done++;});
    return{total,done};
  };

  const handleSave=()=>{
    const nh={...history};
    workout.supersets.forEach(ss=>ss.exercises.forEach(ex=>{
      if(!ex.name)return;
      if(!nh[ex.name])nh[ex.name]=[];
      ex.sets.forEach(s=>{
        if(s.weight&&s.reps&&s.done)
          nh[ex.name].push({weight:s.weight,reps:s.reps,date:new Date().toISOString()});
      });
    }));
    saveHistory(nh);
    setHistory(nh);
    setSaved(true);
    setTimeout(()=>setSaved(false),2500);
  };

  const handleReset=()=>{
    if(window.confirm("Reset this workout? All current entries will be cleared.")){
      setWorkout(defaultWorkout());
      setActiveTab("warmup");
    }
  };

  const{total,done}=countSets();
  const tabs=[
    {id:"warmup", label:"Warm Up",   icon:"flame",    color:"#FF6B35"},
    {id:"supersets",label:"Work",    icon:"dumbbell", color:"#00E5FF"},
    {id:"cooldown",label:"Cool Down",icon:"refresh",  color:"#A78BFA"},
  ];

  // ── TIMER OVERLAY ──
  if(timerActive && queue.length){
    const step=queue[queueIdx]||queue[0];
    return (
      <div style={{...S.root,overflowY:"auto"}}>
        <TimerScreen
          step={step}
          secondsLeft={secondsLeft}
          totalSeconds={totalSeconds}
          running={running}
          onPlayPause={handlePlayPause}
          onSkip={handleSkip}
          onAddTime={handleAddTime}
          workout={workout}
          onLogSet={handleLogSet}
          onExit={()=>{setTimerActive(false);setRunning(false);clearInterval(intervalRef.current);}}
        />
      </div>
    );
  }

  // ── MAIN LAYOUT ──
  return (
    <div style={S.root}>
      {/* HEADER */}
      <div style={S.header}>
        <div>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <Icon name="bolt" size={18} color="#00E5FF"/>
            <span style={S.logoText}>VITALITY</span>
          </div>
          <div style={{fontSize:10,color:"#383840",letterSpacing:"0.1em",marginTop:2}}>
            {new Date().toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"}).toUpperCase()}
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <button style={S.iconBtnSm} onClick={()=>setShowHistory(true)}>
            <Icon name="history" size={19} color="#555"/>
          </button>
          {/* START TIMER BUTTON */}
          <button style={S.startTimerBtn} onClick={launchTimer}>
            <Icon name="play" size={14} color="#0D0D0F"/>
            <span>Start</span>
          </button>
          <ProgressRing total={total} done={done}/>
        </div>
      </div>

      {/* TAB BAR */}
      <div style={S.tabBar}>
        {tabs.map(t=>(
          <button key={t.id}
            style={{...S.tab,...(activeTab===t.id?{...S.tabActive,borderColor:t.color,color:t.color}:{})}}
            onClick={()=>setActiveTab(t.id)}>
            <Icon name={t.icon} size={13} color={activeTab===t.id?t.color:"#444"}/>
            <span>{t.label}</span>
          </button>
        ))}
      </div>

      {/* CONTENT */}
      <div style={S.content}>
        {activeTab==="warmup"&&(
          <div style={S.section}>
            <PhaseHeader icon="flame" label="WARM UP" color="#FF6B35" subtitle="3 exercises · Activate & prep"/>
            {workout.warmup.map((item,i)=>(
              <SimpleItem key={i} exercise={item.name}
                onExerciseChange={name=>updateWarmup(i,{...item,name})}
                history={history} phase="warmup" done={item.done}
                onToggle={()=>updateWarmup(i,{...item,done:!item.done})}/>
            ))}
            <button style={S.nextBtn} onClick={()=>setActiveTab("supersets")}>
              Continue to Work <Icon name="chevDown" size={15} color="#0D0D0F"/>
            </button>
          </div>
        )}

        {activeTab==="supersets"&&(
          <div style={S.section}>
            <PhaseHeader icon="dumbbell" label="STRENGTH WORK" color="#00E5FF" subtitle="3 supersets · 2 exercises each"/>
            {workout.supersets.map((ss,i)=>(
              <SupersetBlock key={i} index={i} data={ss} onChange={d=>updateSuperset(i,d)} history={history}/>
            ))}
            <div style={{display:"flex",gap:10,marginTop:20}}>
              <button style={S.resetBtn} onClick={handleReset}>
                <Icon name="refresh" size={14} color="#666"/> Reset
              </button>
              <button style={{...S.saveBtn,...(saved?S.saveBtnDone:{})}} onClick={handleSave}>
                {saved?<><Icon name="check" size={15} color="#0D0D0F"/> Saved!</>
                      :<><Icon name="bolt"  size={15} color="#0D0D0F"/> Save Sets</>}
              </button>
            </div>
          </div>
        )}

        {activeTab==="cooldown"&&(
          <div style={S.section}>
            <PhaseHeader icon="refresh" label="COOL DOWN" color="#A78BFA" subtitle="3 stretches · Release & recover"/>
            {workout.cooldown.map((item,i)=>(
              <SimpleItem key={i} exercise={item.name}
                onExerciseChange={name=>updateCooldown(i,{...item,name})}
                history={history} phase="cooldown" done={item.done}
                onToggle={()=>updateCooldown(i,{...item,done:!item.done})}/>
            ))}
            <div style={S.completionCard}>
              <div style={{fontSize:36,marginBottom:4}}>🏆</div>
              <div style={{fontSize:20,fontWeight:800,color:"#E8E8EC",letterSpacing:"0.04em"}}>Session Complete</div>
              <div style={{fontSize:13,color:"#555",marginBottom:16}}>{done}/{total} items logged</div>
              <button style={{...S.saveBtn,...(saved?S.saveBtnDone:{}),width:"100%"}} onClick={handleSave}>
                {saved?<><Icon name="check" size={15} color="#0D0D0F"/> Saved to History!</>
                      :<><Icon name="bolt"  size={15} color="#0D0D0F"/> Save & Log Session</>}
              </button>
            </div>
          </div>
        )}
      </div>

      {showHistory&&<HistoryPanel history={history} onClose={()=>setShowHistory(false)}/>}
    </div>
  );
}
